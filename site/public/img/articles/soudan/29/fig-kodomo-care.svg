<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 504" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">離れて暮らす父親の、子どもの年代別の関わり方の要点。乳幼児は会うリズムを一定にしスキンシップ、幼児はあなたのせいじゃないを繰り返し次に会う日を具体的に、小学生低学年は日常の時間と気持ちを言葉にする手伝い、小学生高学年は一人の人として尊重しただ聞く、思春期は詰めすぎずいつでも戻れる場所でいる。あくまで傾向で、目の前の子の様子を最優先に</title>
  <rect x="0.5" y="0.5" width="699" height="503" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">年代別に、どう関わるか（早見）</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">離れて暮らす父親ができる、年代別の関わり方のカギ。</text>

  <!-- header -->
  <rect x="40" y="86" width="620" height="34" rx="8" fill="#1B3A57"/>
  <text x="100" y="108" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">年代</text>
  <text x="308" y="108" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">関わり方のカギ</text>
  <text x="558" y="108" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">声かけの例</text>

  <!-- row 1 -->
  <text x="100" y="146" font-size="12.5" font-weight="700" fill="#1B3A57" text-anchor="middle">乳幼児</text>
  <text x="100" y="164" font-size="11" fill="#6E6354" text-anchor="middle">0〜2歳</text>
  <text x="180" y="146" font-size="12" fill="#2C2A26">会うリズムをできるだけ一定に。</text>
  <text x="180" y="166" font-size="12" fill="#2C2A26">抱っこ・いつもの遊びの繰り返し。</text>
  <text x="558" y="156" font-size="12" fill="#0F6E56" text-anchor="middle">「いつでも大好きだよ」</text>
  <line x1="40" y1="182" x2="660" y2="182" stroke="#ECE3D5"/>

  <!-- row 2 -->
  <text x="100" y="210" font-size="12.5" font-weight="700" fill="#1B3A57" text-anchor="middle">幼児</text>
  <text x="100" y="228" font-size="11" fill="#6E6354" text-anchor="middle">3〜5歳</text>
  <text x="180" y="210" font-size="12" fill="#2C2A26">「あなたのせいじゃない」を反復。</text>
  <text x="180" y="230" font-size="12" fill="#2C2A26">次に会う日を具体的に示す。</text>
  <text x="558" y="212" font-size="12" fill="#0F6E56" text-anchor="middle">「大人の都合。</text>
  <text x="558" y="230" font-size="12" fill="#0F6E56" text-anchor="middle">◯◯は悪くないよ」</text>
  <line x1="40" y1="246" x2="660" y2="246" stroke="#ECE3D5"/>

  <!-- row 3 -->
  <text x="100" y="274" font-size="12.5" font-weight="700" fill="#1B3A57" text-anchor="middle">小学生</text>
  <text x="100" y="292" font-size="11" fill="#6E6354" text-anchor="middle">低学年</text>
  <text x="180" y="274" font-size="12" fill="#2C2A26">特別扱いより、日常の続きの時間。</text>
  <text x="180" y="294" font-size="12" fill="#2C2A26">気持ちを言葉にする手伝いを。</text>
  <text x="558" y="276" font-size="12" fill="#0F6E56" text-anchor="middle">「さみしいって</text>
  <text x="558" y="294" font-size="12" fill="#0F6E56" text-anchor="middle">思っていいんだよ」</text>
  <line x1="40" y1="310" x2="660" y2="310" stroke="#ECE3D5"/>

  <!-- row 4 -->
  <text x="100" y="338" font-size="12.5" font-weight="700" fill="#1B3A57" text-anchor="middle">小学生</text>
  <text x="100" y="356" font-size="11" fill="#6E6354" text-anchor="middle">高学年</text>
  <text x="180" y="338" font-size="12" fill="#2C2A26">一人の人として尊重する。</text>
  <text x="180" y="358" font-size="12" fill="#2C2A26">結論を急がず、ただ話を聞く。</text>
  <text x="558" y="340" font-size="12" fill="#0F6E56" text-anchor="middle">「無理に元気な</text>
  <text x="558" y="358" font-size="12" fill="#0F6E56" text-anchor="middle">ふりしなくていい」</text>
  <line x1="40" y1="374" x2="660" y2="374" stroke="#ECE3D5"/>

  <!-- row 5 -->
  <text x="100" y="402" font-size="12.5" font-weight="700" fill="#1B3A57" text-anchor="middle">思春期</text>
  <text x="100" y="420" font-size="11" fill="#6E6354" text-anchor="middle">13〜18歳</text>
  <text x="180" y="402" font-size="12" fill="#2C2A26">詰めすぎない。返事がなくても</text>
  <text x="180" y="422" font-size="12" fill="#2C2A26">「いつでも戻れる場所」でいる。</text>
  <text x="558" y="404" font-size="12" fill="#0F6E56" text-anchor="middle">「返事はいらない。</text>
  <text x="558" y="422" font-size="12" fill="#0F6E56" text-anchor="middle">いつでも連絡して」</text>

  <!-- separators -->
  <line x1="164" y1="86" x2="164" y2="442" stroke="#ECE3D5"/>
  <line x1="452" y1="86" x2="452" y2="442" stroke="#ECE3D5"/>

  <!-- note -->
  <rect x="40" y="452" width="620" height="44" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="479" font-size="12" fill="#2C2A26">※あくまで傾向。目の前の我が子の様子を最優先に。DVがある場合は、会うことより子の安全が優先。</text>
</svg>
