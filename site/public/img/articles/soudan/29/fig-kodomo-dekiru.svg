<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">離れて暮らす父親でも子の安心につながる関わり方3つ。相手の悪口を子の前で言わない、あなたのせいじゃないと伝える、約束を守り会い続ける。困ったときは自治体や家庭裁判所の相談窓口へ</title>
  <rect x="0.5" y="0.5" width="699" height="359" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">離れて暮らす父親でも、できること</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">公的資料が挙げる、子の安心につながる関わり方。</text>

  <!-- Card 1 -->
  <rect x="40" y="94" width="196" height="188" rx="12" fill="#F4F7FA" stroke="#D5E0EA"/>
  <text x="58" y="124" font-size="13" font-weight="700" fill="#1B3A57">① 相手の悪口を、</text>
  <text x="58" y="143" font-size="13" font-weight="700" fill="#1B3A57">　 子の前で言わない</text>
  <text x="58" y="174" font-size="12" fill="#2C2A26">片方の親の悪口は、子に</text>
  <text x="58" y="194" font-size="12" fill="#2C2A26">「自分の一部を否定された」</text>
  <text x="58" y="214" font-size="12" fill="#2C2A26">と感じさせ、その子の</text>
  <text x="58" y="234" font-size="12" fill="#2C2A26">自信を失わせる。</text>

  <!-- Card 2 -->
  <rect x="252" y="94" width="196" height="188" rx="12" fill="#F4F7FA" stroke="#D5E0EA"/>
  <text x="270" y="124" font-size="13" font-weight="700" fill="#1B3A57">② あなたのせいじゃない</text>
  <text x="270" y="143" font-size="13" font-weight="700" fill="#1B3A57">　 と伝える</text>
  <text x="270" y="174" font-size="12" fill="#2C2A26">離婚は子のせいじゃない、</text>
  <text x="270" y="194" font-size="12" fill="#2C2A26">と言葉にする。「離れても</text>
  <text x="270" y="214" font-size="12" fill="#2C2A26">大切に思っている」と</text>
  <text x="270" y="234" font-size="12" fill="#2C2A26">伝えるのもいい。</text>

  <!-- Card 3 -->
  <rect x="464" y="94" width="196" height="188" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="482" y="124" font-size="13" font-weight="700" fill="#0F6E56">③ 約束を守り、</text>
  <text x="482" y="143" font-size="13" font-weight="700" fill="#0F6E56">　 会い続ける</text>
  <text x="482" y="174" font-size="12" fill="#2C2A26">面会交流は、子のための</text>
  <text x="482" y="194" font-size="12" fill="#2C2A26">もの。定期的で予測できる</text>
  <text x="482" y="214" font-size="12" fill="#2C2A26">関わりが、子の心の</text>
  <text x="482" y="234" font-size="12" fill="#2C2A26">安定につながる。</text>

  <!-- note -->
  <rect x="40" y="298" width="620" height="44" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="325" font-size="12" fill="#2C2A26">強い不調が続く・面会でもめる・DVがあるなど困ったときは、自治体や家庭裁判所の相談窓口へ。</text>
</svg>
