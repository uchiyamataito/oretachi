<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="t d" style="font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
  <title id="t">相談相手の有無による孤独感の違い</title>
  <desc id="d">孤独感を「しばしば・常に」感じる割合は、相談相手がいる人で2.7%、いない人で21.2%。約8倍の差。内閣府・令和6年調査。</desc>
  <rect x="0" y="0" width="1080" height="1080" rx="32" fill="#FBF7F1"/>
  <circle cx="76" cy="84" r="9" fill="#E2703A"/>
  <text x="98" y="94" fill="#9B8E78" font-size="26">内閣府・令和6年 全国調査</text>
  <text x="64" y="200" fill="#2C2A26" font-size="54" font-weight="700">相談できる人がいるだけで、</text>
  <text x="64" y="270" fill="#2C2A26" font-size="54" font-weight="700">孤独感はここまで違う</text>
  <text x="64" y="326" fill="#8A8276" font-size="27">孤独感を「しばしば・常に」感じる人の割合</text>

  <rect x="64" y="392" width="456" height="540" rx="28" fill="#FFFFFF" stroke="#ECE3D5" stroke-width="2"/>
  <circle cx="268" cy="486" r="26" fill="#9BD9C1"/>
  <rect x="232" y="518" width="72" height="58" rx="29" fill="#9BD9C1"/>
  <circle cx="318" cy="486" r="26" fill="#5FC4A4" stroke="#FFFFFF" stroke-width="5"/>
  <rect x="282" y="518" width="72" height="58" rx="29" fill="#5FC4A4" stroke="#FFFFFF" stroke-width="5"/>
  <text x="292" y="648" fill="#6E6557" font-size="31" text-anchor="middle">相談相手が「いる」</text>
  <text x="292" y="772" fill="#1E8E6E" font-size="112" font-weight="700" text-anchor="middle">2.7%</text>
  <text x="292" y="838" fill="#9A9182" font-size="27" text-anchor="middle">が孤独を感じる</text>

  <rect x="560" y="392" width="456" height="540" rx="28" fill="#FFFFFF" stroke="#E2703A" stroke-width="3"/>
  <circle cx="788" cy="486" r="28" fill="#EBB199"/>
  <rect x="750" y="520" width="76" height="60" rx="30" fill="#EBB199"/>
  <text x="788" y="648" fill="#2C2A26" font-size="31" font-weight="500" text-anchor="middle">相談相手が「いない」</text>
  <text x="788" y="772" fill="#D2562A" font-size="112" font-weight="700" text-anchor="middle">21.2%</text>
  <text x="788" y="838" fill="#9A9182" font-size="27" text-anchor="middle">が孤独を感じる</text>

  <circle cx="540" cy="690" r="72" fill="#2C2A26" stroke="#FBF7F1" stroke-width="12"/>
  <text x="540" y="681" fill="#FFFFFF" font-size="34" font-weight="700" text-anchor="middle">約8倍</text>
  <text x="540" y="716" fill="#D9CFC0" font-size="22" text-anchor="middle">の差</text>

  <text x="64" y="1004" fill="#A89B86" font-size="24">出典：内閣府「孤独・孤立の実態把握に関する全国調査」（令和6年）</text>
</svg>
