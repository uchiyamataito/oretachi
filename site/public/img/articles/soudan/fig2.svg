<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 444" role="img" aria-labelledby="t d" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">相談相手の有無による孤独感の違い</title>
  <desc id="d">孤独感を「しばしば・常に」感じる割合は、相談相手がいる人で2.7%、いない人で21.2%。約8倍の差。内閣府・令和6年調査。</desc>
  <rect x="0.5" y="0.5" width="699" height="443" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="48" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">相談できる人がいるだけで、</text>
  <text x="52" y="72" font-size="19" font-weight="800" fill="#1B3A57">孤独感はここまで違う</text>
  <text x="664" y="46" font-size="12" fill="#8C8270" text-anchor="end">内閣府・令和6年 全国調査</text>
  <text x="52" y="98" font-size="12.5" fill="#6E6354">孤独感を「しばしば・常に」感じる人の割合</text>

  <!-- いる -->
  <rect x="36" y="120" width="306" height="264" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="175" cy="164" r="15" fill="#CBE5D6"/>
  <rect x="155" y="182" width="40" height="32" rx="16" fill="#CBE5D6"/>
  <circle cx="203" cy="164" r="15" fill="#0F6E56" stroke="#FBF9F4" stroke-width="4"/>
  <rect x="183" y="182" width="40" height="32" rx="16" fill="#0F6E56" stroke="#FBF9F4" stroke-width="4"/>
  <text x="189" y="252" font-size="14.5" fill="#2C2A26" text-anchor="middle">相談相手が「いる」</text>
  <text x="189" y="312" font-size="46" font-weight="800" fill="#0F6E56" text-anchor="middle">2.7%</text>
  <text x="189" y="348" font-size="12.5" fill="#6E6354" text-anchor="middle">が孤独を感じる</text>

  <!-- いない -->
  <rect x="358" y="120" width="306" height="264" rx="14" fill="#FBF9F4" stroke="#E2703A" stroke-width="1.5"/>
  <circle cx="511" cy="164" r="15" fill="#C9C0B0"/>
  <rect x="491" y="182" width="40" height="32" rx="16" fill="#C9C0B0"/>
  <text x="511" y="252" font-size="14.5" fill="#2C2A26" text-anchor="middle">相談相手が「いない」</text>
  <text x="511" y="312" font-size="46" font-weight="800" fill="#B5481F" text-anchor="middle">21.2%</text>
  <text x="511" y="348" font-size="12.5" fill="#6E6354" text-anchor="middle">が孤独を感じる</text>

  <!-- 差バッジ -->
  <circle cx="350" cy="252" r="42" fill="#1B3A57" stroke="#FFFFFF" stroke-width="6"/>
  <text x="350" y="250" font-size="19" font-weight="700" fill="#FFFFFF" text-anchor="middle">約8倍</text>
  <text x="350" y="272" font-size="12" fill="#C7D3DF" text-anchor="middle">の差</text>

  <text x="36" y="418" font-size="11.5" fill="#8C8270">出典：内閣府「孤独・孤立の実態把握に関する全国調査」（令和6年）</text>
</svg>
