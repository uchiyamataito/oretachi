<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">年金分割の2つの制度の比較。合意分割は婚姻期間中の厚生年金記録が対象で割合は合意または裁判で決め上限は2分の1、相手の合意が必要。3号分割は2008年4月以降の第3号被保険者期間の相手の記録が対象で割合は2分の1固定、相手の合意は不要</title>
  <rect x="0.5" y="0.5" width="699" height="359" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">年金分割には、2つの制度がある</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">長く連れ添った夫婦は、両方が関わることもある。</text>

  <!-- 合意分割 -->
  <rect x="40" y="92" width="300" height="192" rx="12" fill="#F4F7FA" stroke="#D5E0EA"/>
  <text x="60" y="120" font-size="15" font-weight="800" fill="#1B3A57">合意分割</text>
  <text x="60" y="150" font-size="11.5" font-weight="700" fill="#6E6354">対象</text>
  <text x="60" y="170" font-size="12.5" fill="#2C2A26">婚姻期間中の厚生年金の記録</text>
  <text x="60" y="196" font-size="11.5" font-weight="700" fill="#6E6354">割合</text>
  <text x="60" y="216" font-size="12.5" fill="#2C2A26">合意または裁判で決める</text>
  <text x="60" y="234" font-size="12.5" fill="#2C2A26">（上限は2分の1）</text>
  <text x="60" y="260" font-size="11.5" font-weight="700" fill="#6E6354">相手の合意</text>
  <text x="60" y="280" font-size="12.5" font-weight="700" fill="#1B3A57">必要（不調なら裁判所が判断）</text>

  <!-- 3号分割 -->
  <rect x="360" y="92" width="300" height="192" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="380" y="120" font-size="15" font-weight="800" fill="#0F6E56">3号分割</text>
  <text x="380" y="150" font-size="11.5" font-weight="700" fill="#6E6354">対象</text>
  <text x="380" y="170" font-size="12.5" fill="#2C2A26">2008年4月以降の第3号期間の</text>
  <text x="380" y="188" font-size="12.5" fill="#2C2A26">相手の記録</text>
  <text x="380" y="212" font-size="11.5" font-weight="700" fill="#6E6354">割合</text>
  <text x="380" y="232" font-size="12.5" fill="#2C2A26">2分の1で固定</text>
  <text x="380" y="258" font-size="11.5" font-weight="700" fill="#6E6354">相手の合意</text>
  <text x="380" y="278" font-size="12.5" font-weight="700" fill="#0F6E56">不要</text>

  <!-- note -->
  <rect x="40" y="300" width="620" height="44" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="327" font-size="12" fill="#2C2A26">どちらが関わるか・どう組み合わさるかは、個別の加入歴による。詳しくは年金事務所・専門家へ。</text>
</svg>
