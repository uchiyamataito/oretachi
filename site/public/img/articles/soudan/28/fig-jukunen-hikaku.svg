<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 510" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">熟年離婚で、離婚が成立する場合と今の関係が続く場合の比較。お金・年金、住まい・生活費、家事・健康、気持ち・自由、家族との関係の5つの観点で何がどう変わるかを整理。どちらが正解かは人それぞれで、お金の見通しを立ててから判断するのが大事</title>
  <rect x="0.5" y="0.5" width="699" height="509" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">離婚が成立する場合と、今の関係が続く場合</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">何がどう変わるかの整理。どちらが正解かは、人それぞれ。</text>

  <!-- header row -->
  <rect x="40" y="88" width="130" height="34" rx="8" fill="#F4F7FA" stroke="#D5E0EA"/>
  <text x="105" y="110" font-size="12" font-weight="700" fill="#6E6354" text-anchor="middle">観点</text>
  <rect x="178" y="88" width="240" height="34" rx="8" fill="#1B3A57"/>
  <text x="298" y="110" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">離婚が成立する場合</text>
  <rect x="426" y="88" width="234" height="34" rx="8" fill="#3C627F"/>
  <text x="543" y="110" font-size="12.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">今の関係が続く場合</text>

  <!-- row 1 -->
  <text x="52" y="151" font-size="12.5" font-weight="700" fill="#1B3A57">お金・年金</text>
  <text x="190" y="145" font-size="12" fill="#2C2A26">厚生年金の記録（婚姻期間分）を</text>
  <text x="190" y="165" font-size="12" fill="#2C2A26">分割。退職金も対象になりうる。</text>
  <text x="438" y="145" font-size="12" fill="#2C2A26">世帯の年金・退職金は</text>
  <text x="438" y="165" font-size="12" fill="#2C2A26">分けずに済む。</text>
  <line x1="40" y1="182" x2="660" y2="182" stroke="#ECE3D5"/>

  <!-- row 2 -->
  <text x="52" y="215" font-size="12.5" font-weight="700" fill="#1B3A57">住まい・生活費</text>
  <text x="190" y="209" font-size="12" fill="#2C2A26">住まいを分け、単身の生活費を</text>
  <text x="190" y="229" font-size="12" fill="#2C2A26">自分で。コストは二重に。</text>
  <text x="438" y="209" font-size="12" fill="#2C2A26">住まい・生活の基盤は</text>
  <text x="438" y="229" font-size="12" fill="#2C2A26">今のまま。</text>
  <line x1="40" y1="246" x2="660" y2="246" stroke="#ECE3D5"/>

  <!-- row 3 -->
  <text x="52" y="279" font-size="12.5" font-weight="700" fill="#1B3A57">家事・健康</text>
  <text x="190" y="273" font-size="12" fill="#2C2A26">家事・体調管理を自分で。</text>
  <text x="190" y="293" font-size="12" fill="#2C2A26">孤立しない工夫が要る。</text>
  <text x="438" y="273" font-size="12" fill="#2C2A26">これまでの役割分担が</text>
  <text x="438" y="293" font-size="12" fill="#2C2A26">続く。</text>
  <line x1="40" y1="310" x2="660" y2="310" stroke="#ECE3D5"/>

  <!-- row 4 -->
  <text x="52" y="343" font-size="12.5" font-weight="700" fill="#1B3A57">気持ち・自由</text>
  <text x="190" y="337" font-size="12" fill="#2C2A26">我慢からの解放と、自分の時間。</text>
  <text x="190" y="357" font-size="12" fill="#2C2A26">一方で、寂しさも。</text>
  <text x="438" y="337" font-size="12" fill="#2C2A26">自由は限られるが、</text>
  <text x="438" y="357" font-size="12" fill="#2C2A26">慣れた日常は続く。</text>
  <line x1="40" y1="374" x2="660" y2="374" stroke="#ECE3D5"/>

  <!-- row 5 -->
  <text x="52" y="407" font-size="12.5" font-weight="700" fill="#1B3A57">家族・まわり</text>
  <text x="190" y="401" font-size="12" fill="#2C2A26">子や孫との距離・付き合いが</text>
  <text x="190" y="421" font-size="12" fill="#2C2A26">変わることも。</text>
  <text x="438" y="401" font-size="12" fill="#2C2A26">家族の形は、ひとまず</text>
  <text x="438" y="421" font-size="12" fill="#2C2A26">維持される。</text>

  <!-- vertical separators -->
  <line x1="174" y1="88" x2="174" y2="434" stroke="#ECE3D5"/>
  <line x1="422" y1="88" x2="422" y2="434" stroke="#ECE3D5"/>

  <!-- note -->
  <rect x="40" y="446" width="620" height="48" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="470" font-size="12" fill="#2C2A26">正解は人それぞれ。感情で即断せず、お金の見通し（年金分割・退職金・生活費）を立ててから判断を。</text>
  <text x="58" y="488" font-size="12" fill="#2C2A26">迷うときは、一人で抱えず専門家や相談窓口へ。</text>
</svg>
