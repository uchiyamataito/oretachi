<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">年金分割で分けるのは年金の全部ではない。老齢基礎年金と結婚前の厚生年金は対象外で、婚姻期間中の厚生年金の報酬比例部分だけが分割の対象。年金の半分を持っていかれるわけではなく、分けるのは記録の一部で基礎年金には影響しない</title>
  <rect x="0.5" y="0.5" width="699" height="319" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="26" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="44" font-size="19" font-weight="800" fill="#1B3A57">年金分割で「分ける」のは、年金の全部ではない</text>
  <text x="36" y="67" font-size="12.5" fill="#6E6354">対象は、婚姻期間中の厚生年金（報酬比例部分）の記録だけ。</text>

  <rect x="40" y="86" width="620" height="46" rx="10" fill="#F1EDE4" stroke="#E4DACB"/>
  <text x="58" y="114" font-size="13" fill="#6E6354">老齢基礎年金（国民年金）</text>
  <text x="642" y="114" font-size="12" font-weight="700" fill="#8A7F6E" text-anchor="end">対象外</text>

  <rect x="40" y="140" width="620" height="46" rx="10" fill="#F1EDE4" stroke="#E4DACB"/>
  <text x="58" y="168" font-size="13" fill="#6E6354">結婚前の厚生年金（報酬比例部分）</text>
  <text x="642" y="168" font-size="12" font-weight="700" fill="#8A7F6E" text-anchor="end">対象外</text>

  <rect x="40" y="194" width="620" height="46" rx="10" fill="#EFF7F2" stroke="#0F6E56" stroke-width="2"/>
  <text x="58" y="222" font-size="13" font-weight="700" fill="#0F6E56">婚姻期間中の厚生年金（報酬比例部分）</text>
  <text x="642" y="222" font-size="12" font-weight="700" fill="#0F6E56" text-anchor="end">分割の対象</text>

  <rect x="40" y="252" width="620" height="52" rx="10" fill="#FBF1EA" stroke="#E7B39F"/>
  <text x="58" y="275" font-size="12.5" fill="#B5481F"><tspan font-weight="700">よくある誤解：</tspan>「年金の半分を取られる」わけではない。</text>
  <text x="58" y="294" font-size="12.5" fill="#2C2A26">分けるのは記録の一部で、基礎年金には影響しない。</text>
</svg>
