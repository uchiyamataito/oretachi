<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">年金分割で分けるのは年金の全部ではない。対象は婚姻期間中の厚生年金の報酬比例部分の記録だけで、老齢基礎年金や結婚前の厚生年金は対象外。年金の半分を持っていかれるわけではない</title>
  <rect x="0.5" y="0.5" width="699" height="359" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">年金分割で「分ける」のは、年金の全部ではない</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">対象は、婚姻期間中の厚生年金（報酬比例部分）の記録だけ。</text>

  <!-- rows -->
  <rect x="40" y="100" width="404" height="46" rx="10" fill="#F1EDE4" stroke="#E4DACB"/>
  <text x="58" y="128" font-size="13" fill="#6E6354">老齢基礎年金（国民年金）</text>
  <text x="426" y="128" font-size="11.5" font-weight="700" fill="#8A7F6E" text-anchor="end">対象外</text>

  <rect x="40" y="156" width="404" height="46" rx="10" fill="#F1EDE4" stroke="#E4DACB"/>
  <text x="58" y="184" font-size="13" fill="#6E6354">結婚前の厚生年金（報酬比例）</text>
  <text x="426" y="184" font-size="11.5" font-weight="700" fill="#8A7F6E" text-anchor="end">対象外</text>

  <rect x="40" y="212" width="404" height="46" rx="10" fill="#EFF7F2" stroke="#0F6E56" stroke-width="2"/>
  <text x="58" y="240" font-size="13" font-weight="700" fill="#0F6E56">婚姻期間中の厚生年金（報酬比例）</text>
  <text x="426" y="240" font-size="11.5" font-weight="700" fill="#0F6E56" text-anchor="end">分割の対象</text>

  <!-- callout -->
  <rect x="464" y="100" width="196" height="158" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="482" y="126" font-size="13" font-weight="700" fill="#B5481F">よくある誤解</text>
  <text x="482" y="150" font-size="12" fill="#2C2A26">「年金の半分を</text>
  <text x="482" y="170" font-size="12" fill="#2C2A26">持っていかれる」</text>
  <text x="482" y="190" font-size="12" fill="#2C2A26">ではない。</text>
  <text x="482" y="216" font-size="12" fill="#2C2A26">分けるのは記録の</text>
  <text x="482" y="236" font-size="12" fill="#2C2A26">一部。基礎年金には</text>
  <text x="482" y="252" font-size="12" fill="#2C2A26">影響しない。</text>

  <!-- note -->
  <rect x="40" y="280" width="620" height="56" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="58" y="304" font-size="13" font-weight="700" fill="#0F6E56">対象や割合は、加入歴で変わる。</text>
  <text x="58" y="324" font-size="12" fill="#2C2A26">まず「年金分割のための情報通知書」を取ると、対象期間が分かる。</text>
</svg>
