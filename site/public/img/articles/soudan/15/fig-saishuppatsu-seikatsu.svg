<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">立て直す生活の土台：睡眠・食事・住まい・お金の流れ</title>
  <rect x="0.5" y="0.5" width="699" height="219" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">立て直す、生活の4つの土台</text>

  <rect x="36" y="70" width="148" height="128" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="110" cy="94" r="3" fill="#0F6E56"/>
  <text x="110" y="120" font-size="15.5" font-weight="700" fill="#1B3A57" text-anchor="middle">睡眠</text>
  <text x="110" y="150" font-size="12.5" fill="#6E6354" text-anchor="middle">だいたい一定の</text>
  <text x="110" y="170" font-size="12.5" fill="#6E6354" text-anchor="middle">時間に寝起き</text>

  <rect x="196" y="70" width="148" height="128" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="270" cy="94" r="3" fill="#0F6E56"/>
  <text x="270" y="120" font-size="15.5" font-weight="700" fill="#1B3A57" text-anchor="middle">食事</text>
  <text x="270" y="150" font-size="12.5" fill="#6E6354" text-anchor="middle">自炊にこだわらない</text>
  <text x="270" y="170" font-size="12.5" fill="#6E6354" text-anchor="middle">「食べない」だけ回避</text>

  <rect x="356" y="70" width="148" height="128" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="430" cy="94" r="3" fill="#0F6E56"/>
  <text x="430" y="120" font-size="15.5" font-weight="700" fill="#1B3A57" text-anchor="middle">住まい</text>
  <text x="430" y="150" font-size="12.5" fill="#6E6354" text-anchor="middle">一気にやらない</text>
  <text x="430" y="170" font-size="12.5" fill="#6E6354" text-anchor="middle">今日は一角だけ</text>

  <rect x="516" y="70" width="148" height="128" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="590" cy="94" r="3" fill="#0F6E56"/>
  <text x="590" y="120" font-size="15.5" font-weight="700" fill="#1B3A57" text-anchor="middle">お金の流れ</text>
  <text x="590" y="150" font-size="12.5" fill="#6E6354" text-anchor="middle">期限あるものを</text>
  <text x="590" y="170" font-size="12.5" fill="#6E6354" text-anchor="middle">先に確認</text>
</svg>
