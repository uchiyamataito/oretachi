<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 548" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">再出発の順番：①心と体を休める ②生活のリズム ③お金と手続き ④子どもとの関わり ⑤増えた時間を自分のために</title>
  <rect x="0.5" y="0.5" width="699" height="547" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">再出発は、この順番で</text>

  <line x1="64" y1="108" x2="64" y2="492" stroke="#E4DACB" stroke-width="3"/>

  <circle cx="64" cy="108" r="20" fill="#1B3A57"/>
  <text x="64" y="115" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="104" y="104" font-size="16" font-weight="700" fill="#1B3A57">心と体を、まず休める</text>
  <text x="104" y="128" font-size="12.5" fill="#6E6354">回復を待つ。焦らない</text>

  <circle cx="64" cy="204" r="20" fill="#1B3A57"/>
  <text x="64" y="211" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="104" y="200" font-size="16" font-weight="700" fill="#1B3A57">生活のリズムを整える</text>
  <text x="104" y="224" font-size="12.5" fill="#6E6354">睡眠・食事・住まい</text>

  <circle cx="64" cy="300" r="20" fill="#1B3A57"/>
  <text x="64" y="307" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="104" y="296" font-size="16" font-weight="700" fill="#1B3A57">お金と手続きを片づける</text>
  <text x="104" y="320" font-size="12.5" fill="#6E6354">期限のあるものだけ先に</text>

  <circle cx="64" cy="396" r="20" fill="#1B3A57"/>
  <text x="64" y="403" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="104" y="392" font-size="16" font-weight="700" fill="#1B3A57">子どもとの関わりを整える</text>
  <text x="104" y="416" font-size="12.5" fill="#6E6354">面会・養育費・子の前の言動</text>

  <circle cx="64" cy="492" r="20" fill="#0F6E56"/>
  <text x="64" y="499" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="104" y="488" font-size="16" font-weight="700" fill="#0F6E56">増えた時間を、自分のために</text>
  <text x="104" y="512" font-size="12.5" fill="#6E6354">孤独は、時間がやわらげる</text>
</svg>
