<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">切り出された時の返し方：やりがちなNG返しと、こう返す</title>
  <rect width="700" height="420" fill="#ffffff"/>
  <text x="36" y="44" font-size="20" font-weight="700" fill="#2b3a5b">その一言で、先が変わる</text>

  <!-- NG -->
  <rect x="36" y="64" width="306" height="324" rx="16" fill="#fdeeea" stroke="#eebbb0"/>
  <circle cx="70" cy="102" r="17" fill="#e0664c"/>
  <text x="70" y="109" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">✕</text>
  <text x="98" y="109" font-size="18" font-weight="700" fill="#9a4634">やりがちな返し</text>
  <g font-size="14.5" fill="#5b3a32">
    <text x="56" y="156">・「考え直してくれ」と説得・懇願</text>
    <text x="56" y="192">・逆ギレ・人格否定・大声</text>
    <text x="56" y="228">・理由を問い詰める</text>
    <text x="56" y="264">・投げやりに「分かった、離婚」</text>
    <text x="56" y="300">・その場の口約束</text>
    <text x="56" y="336">・感情的な長文LINE</text>
  </g>

  <!-- OK -->
  <rect x="358" y="64" width="306" height="324" rx="16" fill="#eef7f1" stroke="#bfe0cc"/>
  <circle cx="392" cy="102" r="17" fill="#3a9b6e"/>
  <text x="392" y="109" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle">◎</text>
  <text x="420" y="109" font-size="18" font-weight="700" fill="#2b6b4a">こう返す</text>
  <g font-size="14.5" fill="#33433a">
    <text x="378" y="156">・「まだ受け止めきれない、</text>
    <text x="394" y="180">　少し時間がほしい」</text>
    <text x="378" y="224">・「理由は聞きたい。でも</text>
    <text x="394" y="248">　落ち着いてから話したい」</text>
    <text x="378" y="292">・LINEは短く「落ち着いて</text>
    <text x="394" y="316">　話したい」だけ</text>
    <text x="378" y="360" font-size="13" fill="#5f7a6b">結論を言わない・責めない・短い</text>
  </g>
</svg>
