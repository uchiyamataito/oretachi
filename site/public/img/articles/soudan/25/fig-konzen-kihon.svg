<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">婚前契約とは何かの基本3柱。1 結婚前に夫婦の財産や生活のルールを書面で取り決めるもの（民法の夫婦財産契約755条〜759条が土台）、2 婚姻の届出前に締結し届出までに登記しないと第三者に対抗できない、3 婚姻の届出後は原則として内容を変更できない</title>
  <rect x="0.5" y="0.5" width="699" height="239" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">婚前契約とは（民法の「夫婦財産契約」が土台）</text>

  <rect x="36" y="70" width="200" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 114 V84 Q36 70 50 70 H222 Q236 70 236 84 V114 Z" fill="#1B3A57"/>
  <text x="136" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">① 書面で取り決め</text>
  <text x="56" y="136" font-size="12" fill="#2C2A26">結婚前に、夫婦の</text>
  <text x="56" y="154" font-size="12" fill="#2C2A26">財産や生活のルールを</text>
  <text x="56" y="172" font-size="12" fill="#2C2A26">書面で決めておく。</text>
  <text x="56" y="196" font-size="12.5" fill="#6E6354">民法755〜759条が土台</text>

  <rect x="250" y="70" width="200" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M250 114 V84 Q250 70 264 70 H436 Q450 70 450 84 V114 Z" fill="#1B3A57"/>
  <text x="350" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">② 届出前に登記</text>
  <text x="270" y="136" font-size="12" fill="#2C2A26">婚姻の届出前に締結し、</text>
  <text x="270" y="154" font-size="12" fill="#2C2A26">届出までに登記しないと</text>
  <text x="270" y="172" font-size="12" fill="#2C2A26">第三者に対抗できない。</text>
  <text x="270" y="196" font-size="12.5" fill="#6E6354">タイミングが要</text>

  <rect x="464" y="70" width="200" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M464 114 V84 Q464 70 478 70 H650 Q664 70 664 84 V114 Z" fill="#B5481F"/>
  <text x="564" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ 婚姻後は変更不可</text>
  <text x="484" y="136" font-size="12" fill="#2C2A26">婚姻の届出後は、</text>
  <text x="484" y="154" font-size="12" fill="#2C2A26">原則として内容を</text>
  <text x="484" y="172" font-size="12" fill="#2C2A26">変更できない。</text>
  <text x="484" y="196" font-size="12.5" fill="#6E6354">だから結婚前にじっくり</text>
</svg>
