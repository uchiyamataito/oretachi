<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居期間と離婚の関係：協議なら0年でも、裁判では目安3〜5年（有責は10年〜）。ただし総合判断</title>
  <rect x="0.5" y="0.5" width="699" height="329" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">「別居◯年で自動的に離婚」は、ない</text>

  <!-- 協議 -->
  <rect x="36" y="68" width="628" height="80" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="58" y="99" font-size="15.5" font-weight="700" fill="#0F6E56">話し合い（協議）で合意できれば</text>
  <text x="58" y="127" font-size="14.5" fill="#2C2A26">別居 0年でも離婚できる。逆に合意できなければ、何年でも自動では離婚にならない。</text>

  <!-- 裁判 -->
  <rect x="36" y="164" width="628" height="136" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="193" font-size="15.5" font-weight="700" fill="#1B3A57">裁判になった場合（目安）</text>
  <!-- year scale -->
  <line x1="58" y1="234" x2="624" y2="234" stroke="#C9C0B0" stroke-width="2" stroke-linecap="round"/>
  <g fill="#C9C0B0">
    <circle cx="58" cy="234" r="3"/><circle cx="246" cy="234" r="3"/><circle cx="340" cy="234" r="3"/>
  </g>
  <g font-size="12" fill="#8C8270" text-anchor="middle">
    <text x="58" y="258">0年</text>
    <text x="246" y="258">3年</text>
    <text x="340" y="258">5年</text>
    <text x="624" y="258">10年〜</text>
  </g>
  <rect x="246" y="226" width="94" height="16" rx="8" fill="#0F6E56"/>
  <text x="293" y="218" font-size="12.5" font-weight="700" fill="#0F6E56" text-anchor="middle">一般的な目安 3〜5年</text>
  <circle cx="624" cy="234" r="7" fill="#E2703A"/>
  <text x="631" y="218" font-size="12.5" font-weight="700" fill="#B5481F" text-anchor="end">有責側は10年〜</text>
  <text x="58" y="286" font-size="13" fill="#6E6354">※同居期間・別居の事情・子の有無などの総合判断。年数だけでは決まらない。</text>
</svg>
