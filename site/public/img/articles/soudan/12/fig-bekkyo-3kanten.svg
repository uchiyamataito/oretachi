<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 312" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居で先に押さえる3つ：期間・お金・やってはいけないこと</title>
  <rect x="0.5" y="0.5" width="699" height="311" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">別居で先に押さえる、3つだけ</text>

  <!-- card1 期間 -->
  <rect x="36" y="72" width="196" height="192" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 116 V86 Q36 72 50 72 H218 Q232 72 232 86 V116 Z" fill="#1B3A57"/>
  <text x="134" y="100" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">① 期間</text>
  <text x="134" y="152" font-size="14.5" fill="#2C2A26" text-anchor="middle">何年で離婚？</text>
  <text x="134" y="184" font-size="15" font-weight="700" fill="#1B3A57" text-anchor="middle">決まった年数はない</text>
  <line x1="76" y1="208" x2="192" y2="208" stroke="#ECE3D5"/>
  <text x="134" y="236" font-size="12.5" fill="#6E6354" text-anchor="middle">年数より過ごし方</text>

  <!-- card2 お金 -->
  <rect x="252" y="72" width="196" height="192" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M252 116 V86 Q252 72 266 72 H434 Q448 72 448 86 V116 Z" fill="#0F6E56"/>
  <text x="350" y="100" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">② お金</text>
  <text x="350" y="152" font-size="14.5" fill="#2C2A26" text-anchor="middle">生活費（婚姻費用）と</text>
  <text x="350" y="184" font-size="15" font-weight="700" fill="#0F6E56" text-anchor="middle">出る前の「控え」</text>
  <line x1="292" y1="208" x2="408" y2="208" stroke="#ECE3D5"/>
  <text x="350" y="236" font-size="12.5" fill="#6E6354" text-anchor="middle">請求は早めに</text>

  <!-- card3 NG -->
  <rect x="468" y="72" width="196" height="192" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M468 116 V86 Q468 72 482 72 H650 Q664 72 664 86 V116 Z" fill="#B5481F"/>
  <text x="566" y="100" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ やってはいけない</text>
  <text x="566" y="152" font-size="14.5" fill="#2C2A26" text-anchor="middle">無断で出ない／</text>
  <text x="566" y="184" font-size="15" font-weight="700" fill="#B5481F" text-anchor="middle">子の連れ出しは慎重に</text>
  <line x1="508" y1="208" x2="624" y2="208" stroke="#ECE3D5"/>
  <text x="566" y="236" font-size="12.5" fill="#6E6354" text-anchor="middle">勢いの口約束も×</text>
</svg>
