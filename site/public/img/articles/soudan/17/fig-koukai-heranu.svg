<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 278" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">後悔を残さない3つ：やり残さない・感情で動かない・一人で抱えない</title>
  <rect x="0.5" y="0.5" width="699" height="277" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">後悔を「残さない」人がやっていること</text>

  <!-- card1 -->
  <rect x="36" y="70" width="196" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 114 V84 Q36 70 50 70 H218 Q232 70 232 84 V114 Z" fill="#0F6E56"/>
  <text x="134" y="98" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">① やり残さない</text>
  <text x="134" y="138" font-size="12.5" fill="#2C2A26" text-anchor="middle">お金・子ども・手続き</text>
  <text x="134" y="158" font-size="12.5" fill="#2C2A26" text-anchor="middle">を後回しにしない</text>
  <text x="134" y="182" font-size="11.5" fill="#6E6354" text-anchor="middle">準備不足が後悔になる</text>

  <!-- card2 -->
  <rect x="252" y="70" width="196" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M252 114 V84 Q252 70 266 70 H434 Q448 70 448 84 V114 Z" fill="#0F6E56"/>
  <text x="350" y="98" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">② 感情で動かない</text>
  <text x="350" y="138" font-size="12.5" fill="#2C2A26" text-anchor="middle">問い詰める・追う・</text>
  <text x="350" y="158" font-size="12.5" fill="#2C2A26" text-anchor="middle">監視しない。短く冷静に</text>
  <text x="350" y="182" font-size="11.5" fill="#6E6354" text-anchor="middle">勢いが関係をこじらせる</text>

  <!-- card3 -->
  <rect x="468" y="70" width="196" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M468 114 V84 Q468 70 482 70 H650 Q664 70 664 84 V114 Z" fill="#0F6E56"/>
  <text x="566" y="98" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ 一人で抱えない</text>
  <text x="566" y="138" font-size="12.5" fill="#2C2A26" text-anchor="middle">頼れる人がいなくても、</text>
  <text x="566" y="158" font-size="12.5" fill="#2C2A26" text-anchor="middle">無料の窓口でいい</text>
  <text x="566" y="182" font-size="11.5" fill="#6E6354" text-anchor="middle">孤立が後悔を深める</text>

  <!-- footer -->
  <rect x="36" y="210" width="628" height="48" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="350" y="240" font-size="15" font-weight="700" fill="#0F6E56" text-anchor="middle">この3つで「あのとき」の後悔は、かなり減らせる</text>
</svg>
