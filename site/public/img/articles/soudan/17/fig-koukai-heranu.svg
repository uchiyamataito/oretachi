<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 270" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">後悔を残さない3つ：やり残さない・感情で動かない・一人で抱えない</title>
  <rect width="700" height="270" fill="#ffffff"/>
  <text x="36" y="44" font-size="20" font-weight="700" fill="#2b3a5b">後悔を「残さない」人がやっていること</text>

  <!-- card1 -->
  <rect x="36" y="70" width="196" height="118" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
  <text x="134" y="100" font-size="15.5" font-weight="700" fill="#3a9b6e" text-anchor="middle">① やり残さない</text>
  <text x="134" y="128" font-size="12.5" fill="#33433a" text-anchor="middle">お金・子ども・手続き</text>
  <text x="134" y="148" font-size="12.5" fill="#33433a" text-anchor="middle">を後回しにしない</text>
  <text x="134" y="172" font-size="11.5" fill="#6b7280" text-anchor="middle">準備不足が後悔になる</text>

  <!-- card2 -->
  <rect x="252" y="70" width="196" height="118" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
  <text x="350" y="100" font-size="15.5" font-weight="700" fill="#3a9b6e" text-anchor="middle">② 感情で動かない</text>
  <text x="350" y="128" font-size="12.5" fill="#33433a" text-anchor="middle">問い詰める・追う・</text>
  <text x="350" y="148" font-size="12.5" fill="#33433a" text-anchor="middle">監視しない。短く冷静に</text>
  <text x="350" y="172" font-size="11.5" fill="#6b7280" text-anchor="middle">勢いが関係をこじらせる</text>

  <!-- card3 -->
  <rect x="468" y="70" width="196" height="118" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
  <text x="566" y="100" font-size="15.5" font-weight="700" fill="#3a9b6e" text-anchor="middle">③ 一人で抱えない</text>
  <text x="566" y="128" font-size="12.5" fill="#33433a" text-anchor="middle">頼れる人がいなくても、</text>
  <text x="566" y="148" font-size="12.5" fill="#33433a" text-anchor="middle">無料の窓口でいい</text>
  <text x="566" y="172" font-size="11.5" fill="#6b7280" text-anchor="middle">孤立が後悔を深める</text>

  <!-- footer -->
  <rect x="36" y="204" width="628" height="48" rx="12" fill="#fdf3e9" stroke="#f0d2b0"/>
  <text x="350" y="234" font-size="15" font-weight="700" fill="#d98a3d" text-anchor="middle">この3つで「あのとき」の後悔は、かなり減らせる</text>
</svg>
