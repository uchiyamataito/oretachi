<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">離婚して「後悔していない」人が約7割。後悔する人はむしろ少数派</title>
  <rect x="0.5" y="0.5" width="699" height="299" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">離婚して「後悔していない」人が約7割</text>

  <!-- pie -->
  <g>
    <!-- 後悔していない 約73%（teal・大） -->
    <path d="M165 186 L165 100 A86 86 0 1 1 80 196 Z" fill="#0F6E56" stroke="#FFFFFF" stroke-width="2"/>
    <!-- 後悔した 約27%（無彩・小／左上） -->
    <path d="M165 186 L80 196 A86 86 0 0 1 165 100 Z" fill="#C9C0B0" stroke="#FFFFFF" stroke-width="2"/>
    <!-- tealラベル：中心より右下の、広い面に収める -->
    <text x="200" y="205" font-size="25" font-weight="700" fill="#FFFFFF" text-anchor="middle">約7割</text>
    <text x="200" y="228" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">後悔なし</text>
    <!-- 小片ラベル：円の外（左上）に引き出し線付きで -->
    <line x1="118" y1="86" x2="138" y2="108" stroke="#8C8270" stroke-width="2"/>
    <text x="98" y="80" font-size="13" font-weight="700" fill="#6E6354" text-anchor="middle">後悔した 約3割</text>
  </g>

  <!-- legend + note -->
  <rect x="330" y="92" width="18" height="18" rx="3" fill="#0F6E56"/>
  <text x="356" y="107" font-size="15" fill="#2C2A26">後悔していない　<tspan font-weight="700" fill="#0F6E56">約7割</tspan></text>
  <rect x="330" y="124" width="18" height="18" rx="3" fill="#C9C0B0"/>
  <text x="356" y="139" font-size="15" fill="#2C2A26">後悔した　<tspan font-weight="700" fill="#1B3A57">約3割</tspan></text>

  <rect x="330" y="166" width="334" height="98" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="350" y="196" font-size="15.5" font-weight="700" fill="#0F6E56">「離婚＝後悔」は、思い込み。</text>
  <text x="350" y="220" font-size="13.5" fill="#2C2A26">後悔する人は、むしろ少数派だ。</text>
  <text x="350" y="246" font-size="12" fill="#6E6354">※ある小規模調査より。数値は目安。</text>
</svg>
