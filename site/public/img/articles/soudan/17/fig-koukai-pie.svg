<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">離婚して「後悔していない」人が約7割。後悔する人はむしろ少数派</title>
  <rect width="700" height="300" fill="#ffffff"/>
  <text x="36" y="42" font-size="20" font-weight="700" fill="#2b3a5b">離婚して「後悔していない」人が約7割</text>

  <!-- pie -->
  <g>
    <!-- 後悔していない 約73%（緑・大） -->
    <path d="M165 186 L165 100 A86 86 0 1 1 80 196 Z" fill="#3a9b6e" stroke="#ffffff" stroke-width="2"/>
    <!-- 後悔した 約27%（オレンジ・小／左上） -->
    <path d="M165 186 L80 196 A86 86 0 0 1 165 100 Z" fill="#d98a3d" stroke="#ffffff" stroke-width="2"/>
    <!-- 緑ラベル：中心より右下の、緑の広い面に収める -->
    <text x="200" y="205" font-size="25" font-weight="700" fill="#ffffff" text-anchor="middle">約7割</text>
    <text x="200" y="228" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">後悔なし</text>
    <!-- オレンジラベル：円の外（左上）に引き出し線付きで -->
    <line x1="118" y1="86" x2="138" y2="108" stroke="#d98a3d" stroke-width="2"/>
    <text x="98" y="80" font-size="13" font-weight="700" fill="#d98a3d" text-anchor="middle">後悔した 約3割</text>
  </g>

  <!-- legend + note -->
  <rect x="330" y="92" width="18" height="18" rx="3" fill="#3a9b6e"/>
  <text x="356" y="107" font-size="15" fill="#2b3a5b">後悔していない　<tspan font-weight="700">約7割</tspan></text>
  <rect x="330" y="124" width="18" height="18" rx="3" fill="#d98a3d"/>
  <text x="356" y="139" font-size="15" fill="#2b3a5b">後悔した　<tspan font-weight="700">約3割</tspan></text>

  <rect x="330" y="166" width="334" height="98" rx="12" fill="#e9f3ec" stroke="#bfe0cc"/>
  <text x="350" y="196" font-size="15.5" font-weight="700" fill="#3a9b6e">「離婚＝後悔」は、思い込み。</text>
  <text x="350" y="220" font-size="13.5" fill="#33433a">後悔する人は、むしろ少数派だ。</text>
  <text x="350" y="246" font-size="12" fill="#6b7280">※ある小規模調査より。数値は目安。</text>
</svg>
