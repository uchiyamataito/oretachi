<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 290" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">立ち直りの波：最初がいちばんつらく、波がありながら少しずつ楽になっていく</title>
  <rect x="0.5" y="0.5" width="699" height="289" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">つらさには、波と底がある</text>

  <!-- axes -->
  <line x1="70" y1="70" x2="70" y2="230" stroke="#C9C0B0" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="230" x2="660" y2="230" stroke="#C9C0B0" stroke-width="2" stroke-linecap="round"/>
  <text x="48" y="80" font-size="12" fill="#8C8270" text-anchor="end">楽</text>
  <text x="48" y="226" font-size="12" fill="#8C8270" text-anchor="end">辛</text>

  <!-- recovery curve: starts low (つらい), wavy, trending up -->
  <path d="M90 212 C140 222 150 150 200 165 C245 178 250 120 300 138 C345 153 355 108 405 120 C450 131 470 95 520 104 C570 112 600 92 640 96" fill="none" stroke="#0F6E56" stroke-width="3.5" stroke-linecap="round"/>

  <!-- markers -->
  <circle cx="90" cy="212" r="6" fill="#E2703A"/>
  <line x1="92" y1="150" x2="92" y2="205" stroke="#E2703A" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="86" y="142" font-size="12.5" font-weight="700" fill="#B5481F">今が一番つらい</text>
  <circle cx="640" cy="96" r="6" fill="#0F6E56"/>
  <text x="636" y="86" font-size="12.5" font-weight="700" fill="#0F6E56" text-anchor="end">時間とともに、楽に</text>

  <text x="120" y="256" font-size="12" fill="#8C8270">数週間〜数か月</text>
  <text x="640" y="256" font-size="12" fill="#8C8270" text-anchor="end">その後（波はあっても上向き）</text>
  <text x="70" y="280" font-size="12.5" fill="#6E6354">※ずっと同じ深さで沈み続けるわけじゃない。多くの人が、波を繰り返しながら戻っていく。</text>
</svg>
