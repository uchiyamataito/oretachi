<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">冷却期間の連絡：やっていい連絡とやってはいけない連絡</title>
  <rect x="0.5" y="0.5" width="699" height="459" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>

  <!-- OK column -->
  <rect x="36" y="28" width="306" height="404" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 72 V42 Q36 28 50 28 H328 Q342 28 342 42 V72 Z" fill="#0F6E56"/>
  <text x="150" y="57" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">◎</text>
  <text x="170" y="57" font-size="15.5" font-weight="700" fill="#FFFFFF">こうする</text>
  <g font-size="15" fill="#2C2A26">
    <circle cx="60" cy="107" r="3" fill="#0F6E56"/>
    <text x="74" y="112">必要な事務連絡を、淡々と</text>
    <text x="74" y="136" font-size="12.5" fill="#6E6354">　（子ども・お金・荷物など）</text>
    <circle cx="60" cy="173" r="3" fill="#0F6E56"/>
    <text x="74" y="178">短く、用件だけ</text>
    <circle cx="60" cy="215" r="3" fill="#0F6E56"/>
    <text x="74" y="220">返事を急かさない</text>
    <circle cx="60" cy="257" r="3" fill="#0F6E56"/>
    <text x="74" y="262">送る前に一晩おく</text>
  </g>
  <line x1="60" y1="372" x2="318" y2="372" stroke="#ECE3D5"/>
  <text x="60" y="400" font-size="12.5" fill="#6E6354">相手が「負担に感じないか」で判断</text>

  <!-- NG column -->
  <rect x="358" y="28" width="306" height="404" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 72 V42 Q358 28 372 28 H650 Q664 28 664 42 V72 Z" fill="#B5481F"/>
  <text x="478" y="57" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">✕</text>
  <text x="498" y="57" font-size="15.5" font-weight="700" fill="#FFFFFF">さける</text>
  <g font-size="15" fill="#2C2A26">
    <circle cx="382" cy="107" r="3" fill="#B5481F"/>
    <text x="396" y="112">毎日の「元気？」「会いたい」</text>
    <circle cx="382" cy="149" r="3" fill="#B5481F"/>
    <text x="396" y="154">気持ちを綴った長文</text>
    <circle cx="382" cy="191" r="3" fill="#B5481F"/>
    <text x="396" y="196">「なんで」と問い詰める</text>
    <circle cx="382" cy="233" r="3" fill="#B5481F"/>
    <text x="396" y="238">「もう一度だけ」の懇願</text>
    <circle cx="382" cy="275" r="3" fill="#B5481F"/>
    <text x="396" y="280">深夜のLINE</text>
  </g>
  <line x1="382" y1="372" x2="640" y2="372" stroke="#ECE3D5"/>
  <text x="382" y="400" font-size="12.5" fill="#6E6354">頻度と中身で、相手は引いてしまう</text>
</svg>
