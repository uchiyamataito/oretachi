<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 428" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">冷却期間のイメージ：追う→いったん引く→相手に余白が生まれる</title>
  <rect x="0.5" y="0.5" width="699" height="427" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>

  <!-- step1 追いかける -->
  <rect x="36" y="28" width="628" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="76" cy="76" r="20" fill="#B5481F"/>
  <text x="76" y="83" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="112" y="70" font-size="17" font-weight="700" fill="#1B3A57">追いかける</text>
  <text x="112" y="98" font-size="13.5" fill="#6E6354">迫るほど、相手は引いていく</text>

  <path d="M350 128 L350 148" stroke="#C9C0B0" stroke-width="3"/>
  <path d="M341 142 L350 153 L359 142 Z" fill="#C9C0B0"/>

  <!-- step2 いったん引く -->
  <rect x="36" y="160" width="628" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="76" cy="208" r="20" fill="#1B3A57"/>
  <text x="76" y="215" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="112" y="202" font-size="17" font-weight="700" fill="#1B3A57">いったん引く</text>
  <text x="112" y="230" font-size="13.5" fill="#6E6354">圧を抜いて、話せる「間」をつくる</text>

  <path d="M350 260 L350 280" stroke="#C9C0B0" stroke-width="3"/>
  <path d="M341 274 L350 285 L359 274 Z" fill="#C9C0B0"/>

  <!-- step3 余白が生まれる -->
  <rect x="36" y="292" width="628" height="96" rx="14" fill="#EFF7F2" stroke="#CBE5D6"/>
  <circle cx="76" cy="340" r="20" fill="#0F6E56"/>
  <text x="76" y="347" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="112" y="334" font-size="17" font-weight="700" fill="#0F6E56">余白が生まれる</text>
  <text x="112" y="362" font-size="13.5" fill="#6E6354">「また話せるかも」の余地ができる</text>

  <text x="350" y="412" font-size="12.5" fill="#6E6354" text-anchor="middle">冷却期間は「あきらめ」ではなく、話せる土台をつくる時間</text>
</svg>
