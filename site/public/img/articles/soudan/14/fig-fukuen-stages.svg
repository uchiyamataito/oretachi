<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 308" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">妻の心の段階：不満→あきらめ→無関心（無関心が赤信号）</title>
  <rect x="0.5" y="0.5" width="699" height="307" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">妻の心には「順番」がある</text>

  <!-- stage1 不満 -->
  <rect x="36" y="76" width="188" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="130" y="118" font-size="18" font-weight="700" fill="#1B3A57" text-anchor="middle">不満</text>
  <text x="130" y="148" font-size="12.5" fill="#6E6354" text-anchor="middle">伝えても変わらない</text>

  <path d="M230 124 L248 124" stroke="#C9C0B0" stroke-width="3"/>
  <path d="M244 116 L254 124 L244 132 Z" fill="#C9C0B0"/>

  <!-- stage2 あきらめ -->
  <rect x="256" y="76" width="188" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="350" y="118" font-size="18" font-weight="700" fill="#1B3A57" text-anchor="middle">あきらめ</text>
  <text x="350" y="148" font-size="12.5" fill="#6E6354" text-anchor="middle">期待しなくなる</text>

  <path d="M450 124 L468 124" stroke="#C9C0B0" stroke-width="3"/>
  <path d="M464 116 L474 124 L464 132 Z" fill="#C9C0B0"/>

  <!-- stage3 無関心 -->
  <rect x="476" y="76" width="188" height="96" rx="14" fill="#FBF9F4" stroke="#B5481F" stroke-width="2"/>
  <text x="570" y="118" font-size="18" font-weight="700" fill="#B5481F" text-anchor="middle">無関心</text>
  <text x="570" y="148" font-size="12.5" fill="#B5481F" text-anchor="middle">怒りも消える＝赤信号</text>
  <circle cx="500" cy="94" r="6" fill="#E2703A"/>

  <text x="36" y="216" font-size="14.5" fill="#2C2A26">怒っている＝まだ「変わってほしい」期待が残っている。</text>
  <text x="36" y="244" font-size="14.5" fill="#2C2A26">本当に手遅れに近いのは、淡々と事務的になった（無関心の）時。</text>
  <text x="36" y="278" font-size="12.5" fill="#6E6354">「静かになった＝脈あり」と早合点しないこと。</text>
</svg>
