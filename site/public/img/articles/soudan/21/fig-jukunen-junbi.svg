<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 312" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">熟年離婚に備えて今からやること。1 生活力＝自分の食事を一品・洗濯して干す・部屋を片づける最低限から。2 お金＝取り分の計算でなく何がどれだけあるかを一枚に棚卸し。3 つながり＝一人でいいから弱音を吐ける相手や無料の相談窓口を確保。4 専門家＝協議から家裁の調停・審判へ、揉めそうなら弁護士や法テラスへ。一気にやらず、できるところから一つずつ</title>
  <rect x="0.5" y="0.5" width="699" height="311" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">今からやること（できるところから一つずつ）</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">成立してから慌てるより、今のうちに手を動かすほうが楽。</text>

  <!-- 1 生活力 -->
  <rect x="36" y="84" width="628" height="48" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="64" cy="108" r="13" fill="#0F6E56"/>
  <text x="64" y="113" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="90" y="113" font-size="13.5" font-weight="700" fill="#0F6E56">生活力</text>
  <line x1="192" y1="94" x2="192" y2="122" stroke="#ECE3D5" stroke-width="1"/>
  <text x="208" y="113" font-size="12.5" fill="#2C2A26">自分の食事を一品／洗濯して干す／部屋を片づける。この最低限から。</text>

  <!-- 2 お金 -->
  <rect x="36" y="140" width="628" height="48" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="64" cy="164" r="13" fill="#0F6E56"/>
  <text x="64" y="169" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="90" y="169" font-size="13.5" font-weight="700" fill="#0F6E56">お金</text>
  <line x1="192" y1="150" x2="192" y2="178" stroke="#ECE3D5" stroke-width="1"/>
  <text x="208" y="169" font-size="12.5" fill="#2C2A26">取り分の計算でなく、まず「何がどれだけあるか」を一枚に棚卸し。</text>

  <!-- 3 つながり -->
  <rect x="36" y="196" width="628" height="48" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="64" cy="220" r="13" fill="#0F6E56"/>
  <text x="64" y="225" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="90" y="225" font-size="13.5" font-weight="700" fill="#0F6E56">つながり</text>
  <line x1="192" y1="206" x2="192" y2="234" stroke="#ECE3D5" stroke-width="1"/>
  <text x="208" y="225" font-size="12.5" fill="#2C2A26">一人でいいから、弱音を吐ける相手を確保。無料の相談窓口も一つ。</text>

  <!-- 4 専門家 -->
  <rect x="36" y="252" width="628" height="48" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="64" cy="276" r="13" fill="#1B3A57"/>
  <text x="64" y="281" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="90" y="281" font-size="13.5" font-weight="700" fill="#1B3A57">専門家</text>
  <line x1="192" y1="262" x2="192" y2="290" stroke="#ECE3D5" stroke-width="1"/>
  <text x="208" y="281" font-size="12.5" fill="#2C2A26">協議→家裁の調停→審判。揉めそう/不安なら弁護士・法テラスへ。</text>
</svg>
