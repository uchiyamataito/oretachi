<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">熟年離婚を切り出された夫が、その後にやること4つ。生活力(家事)を身につける・お金の全体像を棚卸し・人とのつながりを確保・財産分与や年金は公的入口と専門家へ。まずは衝撃を受け止めることから</title>
  <rect width="700" height="330" fill="#ffffff"/>
  <text x="36" y="40" font-size="19" font-weight="700" fill="#2b3a5b">受け止めて、生活を立て直す。今やること</text>
  <text x="36" y="62" font-size="12.5" fill="#6b7280">まずは衝撃を受け止めることから。あとは、できるところから一つずつ。</text>

  <rect x="36" y="82" width="312" height="80" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="54" y="112" font-size="14" font-weight="700" fill="#3f7d54">① 生活力（家事）を身につける</text>
  <text x="54" y="138" font-size="12.5" fill="#26402e">食事・洗濯・掃除。気合でなく慣れ。</text>

  <rect x="360" y="82" width="304" height="80" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="378" y="112" font-size="14" font-weight="700" fill="#3f7d54">② お金の全体像を棚卸し</text>
  <text x="378" y="138" font-size="12.5" fill="#26402e">預貯金・退職金・年金・保険・住まい。</text>

  <rect x="36" y="174" width="312" height="80" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="54" y="204" font-size="14" font-weight="700" fill="#3f7d54">③ 人とのつながりを確保</text>
  <text x="54" y="230" font-size="12.5" fill="#26402e">一人でいい。弱音を吐ける相手を。</text>

  <rect x="360" y="174" width="304" height="80" rx="12" fill="#eef1f6" stroke="#cdd8ea"/>
  <text x="378" y="204" font-size="14" font-weight="700" fill="#2b3a5b">④ 財産分与・年金は専門家へ</text>
  <text x="378" y="230" font-size="12.5" fill="#33433a">金額・取り分は自分で断定しない。</text>

  <rect x="36" y="266" width="628" height="48" rx="12" fill="#fbf6ee" stroke="#e0cdb2"/>
  <text x="52" y="290" font-size="12.5" fill="#5b4a33">※ 財産分与・年金分割の取り分や金額は、裁判所・年金事務所・弁護士・法テラスで確認する。</text>
  <text x="52" y="308" font-size="12.5" fill="#5b4a33">　噂やネットの「相場」を自分に当てはめて、一人で怖がらないこと。</text>
</svg>
