<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">養育費の決め方の流れ。1 まず父母の協議で金額・支払方法・終期などを決める、2 口約束でなく公正証書や調停調書など書面に残す（差押えの根拠になる）、3 まとまらない・話すのがつらいなら家庭裁判所の調停、4 それでも決まらなければ審判で裁判所が判断</title>
  <rect x="0.5" y="0.5" width="699" height="249" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">養育費の決め方：協議→書面→（調停・審判）</text>

  <rect x="36" y="70" width="196" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 114 V84 Q36 70 50 70 H218 Q232 70 232 84 V114 Z" fill="#1B3A57"/>
  <text x="134" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1. まず協議</text>
  <text x="54" y="140" font-size="12" fill="#2C2A26">父母の話し合いで、</text>
  <text x="54" y="158" font-size="12" fill="#2C2A26">金額・支払方法・</text>
  <text x="54" y="176" font-size="12" fill="#2C2A26">いつまで払うかを決める。</text>

  <path d="M240 147 h20 m-9 -7 l9 7 l-9 7" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <rect x="268" y="70" width="196" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M268 114 V84 Q268 70 282 70 H450 Q464 70 464 84 V114 Z" fill="#0F6E56"/>
  <text x="366" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2. 書面に残す</text>
  <text x="286" y="140" font-size="12" fill="#2C2A26">口約束はNG。</text>
  <text x="286" y="158" font-size="12" fill="#2C2A26">公正証書や調停調書に。</text>
  <text x="286" y="176" font-size="12" fill="#2C2A26">差押えの根拠になる。</text>
  <text x="286" y="200" font-size="12.5" fill="#6E6354">※面会などとセットで</text>

  <path d="M472 147 h20 m-9 -7 l9 7 l-9 7" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <rect x="500" y="70" width="164" height="154" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M500 114 V84 Q500 70 514 70 H650 Q664 70 664 84 V114 Z" fill="#1B3A57"/>
  <text x="582" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3. 家庭裁判所</text>
  <text x="518" y="140" font-size="12" fill="#2C2A26">まとまらなければ</text>
  <text x="518" y="158" font-size="12" fill="#2C2A26">調停（委員が仲介）、</text>
  <text x="518" y="176" font-size="12" fill="#2C2A26">決まらなければ審判。</text>
</svg>
