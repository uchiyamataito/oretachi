<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">養育費の決め方の流れ。1 まず父母の協議で金額・支払方法・終期などを決める、2 口約束でなく公正証書や調停調書など書面に残す（差押えの根拠になる）、3 まとまらない・話すのがつらいなら家庭裁判所の調停、4 それでも決まらなければ審判で裁判所が判断</title>
  <rect width="700" height="250" fill="#ffffff"/>
  <text x="36" y="40" font-size="19" font-weight="700" fill="#2b3a5b">養育費の決め方：協議→書面→（調停・審判）</text>

  <rect x="36" y="66" width="196" height="150" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="54" y="94" font-size="14" font-weight="700" fill="#3f7d54">1. まず協議</text>
  <text x="54" y="120" font-size="12" fill="#26402e">父母の話し合いで、</text>
  <text x="54" y="138" font-size="12" fill="#26402e">金額・支払方法・</text>
  <text x="54" y="156" font-size="12" fill="#26402e">いつまで払うかを決める。</text>

  <path d="M240 141 h20 m-9 -7 l9 7 l-9 7" fill="none" stroke="#9aa1ab" stroke-width="2.5"/>

  <rect x="268" y="66" width="196" height="150" rx="12" fill="#fbf6ee" stroke="#e0cdb2"/>
  <text x="286" y="94" font-size="14" font-weight="700" fill="#c0793a">2. 書面に残す</text>
  <text x="286" y="120" font-size="12" fill="#5b4a33">口約束はNG。</text>
  <text x="286" y="138" font-size="12" fill="#5b4a33">公正証書や調停調書に。</text>
  <text x="286" y="156" font-size="12" fill="#5b4a33">差押えの根拠になる。</text>
  <text x="286" y="182" font-size="11.5" fill="#8a6f4a">※面会などとセットで</text>

  <path d="M472 141 h20 m-9 -7 l9 7 l-9 7" fill="none" stroke="#9aa1ab" stroke-width="2.5"/>

  <rect x="500" y="66" width="164" height="150" rx="12" fill="#eef1f6" stroke="#cdd8ea"/>
  <text x="518" y="94" font-size="14" font-weight="700" fill="#2b3a5b">3. 家庭裁判所</text>
  <text x="518" y="120" font-size="12" fill="#33433a">まとまらなければ</text>
  <text x="518" y="138" font-size="12" fill="#33433a">調停（委員が仲介）、</text>
  <text x="518" y="156" font-size="12" fill="#33433a">決まらなければ審判。</text>
</svg>
