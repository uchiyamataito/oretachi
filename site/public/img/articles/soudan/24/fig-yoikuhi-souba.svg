<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 308" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">養育費の相場イメージ（裁判所の養育費算定表・給与所得の目安）。子1人8歳の場合、あなたの年収500万・相手100万で月4〜6万円、あなた600万・相手100万で月6〜8万円。子3人5歳9歳17歳の場合、あなた600万・相手100万でおおむね月10〜12万円。すべて給与所得の目安で、年収や私立学校の学費など特別な事情で増減する</title>
  <rect x="0.5" y="0.5" width="699" height="307" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">養育費の相場イメージ（算定表・給与の目安）</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">「あなたの年収 × 相手の年収 × 子の人数・年齢」の交点で決まる。</text>

  <rect x="36" y="80" width="628" height="92" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="54" y="106" font-size="14" font-weight="700" fill="#1B3A57">子1人（8歳）の場合</text>
  <text x="54" y="134" font-size="13" fill="#2C2A26">あなた 年収500万・相手 100万</text>
  <text x="470" y="134" font-size="14" font-weight="700" fill="#1B3A57">月4〜6万円</text>
  <text x="54" y="158" font-size="13" fill="#2C2A26">あなた 年収600万・相手 100万</text>
  <text x="470" y="158" font-size="14" font-weight="700" fill="#1B3A57">月6〜8万円</text>

  <rect x="36" y="182" width="628" height="60" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="54" y="208" font-size="14" font-weight="700" fill="#1B3A57">子3人（5歳・9歳・17歳）の場合</text>
  <text x="54" y="232" font-size="13" fill="#2C2A26">あなた 年収600万・相手 100万</text>
  <text x="420" y="232" font-size="14" font-weight="700" fill="#1B3A57">おおむね 月10〜12万円</text>

  <rect x="36" y="252" width="628" height="44" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="52" y="272" font-size="11.5" fill="#6E6354">※すべて給与所得・額面年収のイメージ。あくまで標準的な目安で、</text>
  <text x="52" y="288" font-size="11.5" fill="#6E6354">　正確な額は算定表そのもの・専門家・家庭裁判所で確認を。</text>
</svg>
