<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">養育費が払われない・払えない時の手順。受け取る側は、公正証書や調停調書があれば履行勧告・履行命令、さらに強制執行で給与や預金を差し押さえられる。払う側は、失業や収入減で苦しくても勝手に止めず、減額の調停を申し立てる。黙って止める放置は差押えにつながり逆効果</title>
  <rect x="0.5" y="0.5" width="699" height="259" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">払われない／払えない時：正規の手段がある</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">感情で自己判断せず、正規ルートで動く。</text>

  <!-- 受け取る側 -->
  <rect x="36" y="84" width="312" height="152" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H334 Q348 84 348 98 V128 Z" fill="#0F6E56"/>
  <text x="192" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">払われない側（受け取る）</text>
  <circle cx="60" cy="142" r="3" fill="#0F6E56"/>
  <text x="70" y="146" font-size="12.5" fill="#2C2A26">書面（公正証書・調停調書）が</text>
  <text x="70" y="164" font-size="12.5" fill="#2C2A26">　あれば履行勧告・履行命令</text>
  <circle cx="60" cy="184" r="3" fill="#0F6E56"/>
  <text x="70" y="188" font-size="12.5" fill="#2C2A26">さらに強制執行＝給与や</text>
  <text x="70" y="206" font-size="12.5" fill="#2C2A26">　預金の差押え</text>
  <text x="70" y="226" font-size="12.5" fill="#6E6354">2026改正で、より使いやすく</text>

  <!-- 支払う側 -->
  <rect x="360" y="84" width="304" height="152" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M360 128 V98 Q360 84 374 84 H650 Q664 84 664 98 V128 Z" fill="#B5481F"/>
  <text x="512" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">払えない側（支払う）</text>
  <circle cx="384" cy="142" r="3" fill="#B5481F"/>
  <text x="394" y="146" font-size="12.5" fill="#2C2A26">絶対NG＝黙って止める</text>
  <text x="394" y="164" font-size="12.5" fill="#2C2A26">　（放置は差押えにつながる）</text>
  <circle cx="384" cy="184" r="3" fill="#B5481F"/>
  <text x="394" y="188" font-size="12.5" fill="#2C2A26">正しい一手＝減額の調停を</text>
  <text x="394" y="206" font-size="12.5" fill="#2C2A26">　申し立てる（事情変更）</text>
  <text x="394" y="226" font-size="12.5" fill="#6E6354">止めるでなく、正規に下げる</text>
</svg>
