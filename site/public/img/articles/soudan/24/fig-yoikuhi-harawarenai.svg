<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">養育費が払われない・払えない時の手順。受け取る側は、公正証書や調停調書があれば履行勧告・履行命令、さらに強制執行で給与や預金を差し押さえられる。払う側は、失業や収入減で苦しくても勝手に止めず、減額の調停を申し立てる。黙って止める放置は差押えにつながり逆効果</title>
  <rect width="700" height="260" fill="#ffffff"/>
  <text x="36" y="40" font-size="19" font-weight="700" fill="#2b3a5b">払われない／払えない時：正規の手段がある</text>
  <text x="36" y="62" font-size="12.5" fill="#6b7280">感情で自己判断せず、正規ルートで動く。</text>

  <rect x="36" y="82" width="312" height="150" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="54" y="110" font-size="15" font-weight="700" fill="#3f7d54">払われない側（受け取る）</text>
  <text x="54" y="138" font-size="12.5" fill="#26402e">・書面（公正証書・調停調書）が</text>
  <text x="54" y="156" font-size="12.5" fill="#26402e">　あれば履行勧告・履行命令</text>
  <text x="54" y="180" font-size="12.5" fill="#26402e">・さらに強制執行＝給与や</text>
  <text x="54" y="198" font-size="12.5" fill="#26402e">　預金の差押え</text>
  <text x="54" y="220" font-size="11.5" fill="#4a5a4f">2026改正で、より使いやすく</text>

  <rect x="360" y="82" width="304" height="150" rx="12" fill="#fbf6ee" stroke="#e0cdb2"/>
  <text x="378" y="110" font-size="15" font-weight="700" fill="#c0793a">払えない側（支払う）</text>
  <text x="378" y="138" font-size="12.5" fill="#5b4a33">・絶対NG＝黙って止める</text>
  <text x="378" y="156" font-size="12.5" fill="#5b4a33">　（放置は差押えにつながる）</text>
  <text x="378" y="180" font-size="12.5" fill="#5b4a33">・正しい一手＝減額の調停を</text>
  <text x="378" y="198" font-size="12.5" fill="#5b4a33">　申し立てる（事情変更）</text>
  <text x="378" y="220" font-size="11.5" fill="#8a6f4a">止めるでなく、正規に下げる</text>
</svg>
