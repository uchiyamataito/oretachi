<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" role="img" aria-labelledby="t d" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">家事の最低ラインは4つだけ</title>
  <desc id="d">食事＝「食べない」を避ける・自炊にこだわらない。洗濯＝「着る服がない」を避ける・ためない仕組み。掃除＝「不潔で体を壊す」を避ける・一角だけ。買い物＝「切らして困る」を避ける・ネットで自動化。</desc>
  <rect width="700" height="220" fill="#ffffff"/>
  <text x="24" y="32" font-size="18" font-weight="700" fill="#2b3a5b">家事の最低ラインは、たった4つ</text>
  <text x="24" y="52" font-size="12.5" fill="#8a8270">完璧じゃなく「回す」。それぞれ避けたい一線と、やり方だけ。</text>

  <g>
    <rect x="24" y="66" width="156" height="120" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <text x="102" y="96" font-size="16" font-weight="700" fill="#2b6b4a" text-anchor="middle">食事</text>
    <text x="102" y="124" font-size="12" fill="#46715b" text-anchor="middle">避ける：食べない日</text>
    <text x="102" y="150" font-size="12.5" fill="#2b6b4a" text-anchor="middle" font-weight="700">自炊にこだわらない</text>
  </g>
  <g>
    <rect x="196" y="66" width="156" height="120" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <text x="274" y="96" font-size="16" font-weight="700" fill="#2b6b4a" text-anchor="middle">洗濯</text>
    <text x="274" y="124" font-size="12" fill="#46715b" text-anchor="middle">避ける：着る服切れ</text>
    <text x="274" y="150" font-size="12.5" fill="#2b6b4a" text-anchor="middle" font-weight="700">ためない仕組み</text>
  </g>
  <g>
    <rect x="368" y="66" width="156" height="120" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <text x="446" y="96" font-size="16" font-weight="700" fill="#2b6b4a" text-anchor="middle">掃除</text>
    <text x="446" y="124" font-size="12" fill="#46715b" text-anchor="middle">避ける：不潔で体調悪化</text>
    <text x="446" y="150" font-size="12.5" fill="#2b6b4a" text-anchor="middle" font-weight="700">今日は一角だけ</text>
  </g>
  <g>
    <rect x="540" y="66" width="136" height="120" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <text x="608" y="96" font-size="16" font-weight="700" fill="#2b6b4a" text-anchor="middle">買い物</text>
    <text x="608" y="124" font-size="12" fill="#46715b" text-anchor="middle">避ける：切らして困る</text>
    <text x="608" y="150" font-size="12.5" fill="#2b6b4a" text-anchor="middle" font-weight="700">ネットで自動化</text>
  </g>
  <text x="350" y="208" font-size="12.5" fill="#8a8270" text-anchor="middle">60点で回り続けるほうが、100点で三日坊主より強い。</text>
</svg>
