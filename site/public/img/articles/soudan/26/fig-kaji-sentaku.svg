<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 252" role="img" aria-labelledby="t d" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">洗濯洗剤と柔軟剤の違いと、入れる場所</title>
  <desc id="d">洗濯洗剤は汚れとニオイを落とす必須アイテムで「洗剤」投入口へ。柔軟剤はふんわり・香り・静電気防止の任意アイテムで「柔軟剤」投入口へ。分量は入れすぎず、容器裏の水量あたりの表示に従う。</desc>
  <rect x="0.5" y="0.5" width="699" height="251" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">洗剤と柔軟剤は別物。入れる場所も違う</text>

  <!-- 洗濯洗剤 -->
  <rect x="36" y="64" width="306" height="132" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 108 V78 Q36 64 50 64 H328 Q342 64 342 78 V108 Z" fill="#0F6E56"/>
  <text x="189" y="92" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">洗濯洗剤　<tspan font-size="13">【必須】</tspan></text>
  <text x="58" y="132" font-size="12.5" fill="#2C2A26">汚れとニオイを落とす。これが</text>
  <text x="58" y="150" font-size="12.5" fill="#2C2A26">ないと洗濯にならない。</text>
  <text x="58" y="180" font-size="12.5" font-weight="700" fill="#0F6E56">入れる場所：「洗剤」の投入口</text>

  <!-- 柔軟剤 -->
  <rect x="358" y="64" width="306" height="132" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 108 V78 Q358 64 372 64 H650 Q664 64 664 78 V108 Z" fill="#1B3A57"/>
  <text x="511" y="92" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">柔軟剤　<tspan font-size="13">【任意】</tspan></text>
  <text x="380" y="132" font-size="12.5" fill="#2C2A26">ふんわり・いい香り・静電気を</text>
  <text x="380" y="150" font-size="12.5" fill="#2C2A26">抑える。なくても洗える。</text>
  <text x="380" y="180" font-size="12.5" font-weight="700" fill="#1B3A57">入れる場所：「柔軟剤」の投入口</text>

  <!-- note -->
  <rect x="36" y="210" width="628" height="34" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="350" y="232" font-size="12.5" fill="#6E6354" text-anchor="middle">分量は入れすぎない。容器裏の「水量◯Lで◯mL」の表示どおりが正解。</text>
</svg>
