<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" role="img" aria-labelledby="t d" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">炊飯器での米の炊き方4ステップ</title>
  <desc id="d">1量る（すりきり1杯＝1合）→2研ぐ（無洗米は不要）→3水加減（内釜の目盛りまで）→4炊く（ボタンを押すだけ）。多めに炊いて1食ずつ冷凍しておく。</desc>
  <rect width="700" height="200" fill="#ffffff"/>
  <text x="24" y="32" font-size="18" font-weight="700" fill="#2b3a5b">最低限これだけ：炊飯器での米の炊き方</text>

  <g>
    <rect x="24" y="52" width="145" height="92" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <circle cx="50" cy="78" r="13" fill="#2b6b4a"/><text x="50" y="83" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="72" y="83" font-size="14" font-weight="700" fill="#2b6b4a">量る</text>
    <text x="42" y="112" font-size="11.5" fill="#46715b">すりきり1杯</text>
    <text x="42" y="129" font-size="11.5" fill="#46715b">＝1合（約150g）</text>
  </g>
  <text x="180" y="103" font-size="18" fill="#bfae93" text-anchor="middle">›</text>
  <g>
    <rect x="193" y="52" width="145" height="92" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <circle cx="219" cy="78" r="13" fill="#2b6b4a"/><text x="219" y="83" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="241" y="83" font-size="14" font-weight="700" fill="#2b6b4a">研ぐ</text>
    <text x="211" y="112" font-size="11.5" fill="#46715b">水を2〜3回替える</text>
    <text x="211" y="129" font-size="11.5" fill="#9a4634" font-weight="700">無洗米は不要</text>
  </g>
  <text x="349" y="103" font-size="18" fill="#bfae93" text-anchor="middle">›</text>
  <g>
    <rect x="362" y="52" width="145" height="92" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <circle cx="388" cy="78" r="13" fill="#2b6b4a"/><text x="388" y="83" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="410" y="83" font-size="14" font-weight="700" fill="#2b6b4a">水加減</text>
    <text x="380" y="112" font-size="11.5" fill="#46715b">内釜の「◯合」の</text>
    <text x="380" y="129" font-size="11.5" fill="#46715b">目盛りまで</text>
  </g>
  <text x="518" y="103" font-size="18" fill="#bfae93" text-anchor="middle">›</text>
  <g>
    <rect x="531" y="52" width="145" height="92" rx="14" fill="#e9f3ec" stroke="#bfe0cc"/>
    <circle cx="557" cy="78" r="13" fill="#2b6b4a"/><text x="557" y="83" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="579" y="83" font-size="14" font-weight="700" fill="#2b6b4a">炊く</text>
    <text x="549" y="112" font-size="11.5" fill="#46715b">ボタンを</text>
    <text x="549" y="129" font-size="11.5" fill="#46715b">押すだけ</text>
  </g>
  <text x="24" y="176" font-size="12.5" fill="#8a8270">多めに炊いて、1食ずつラップして冷凍 → レンジで温めれば自前の「パックご飯」。</text>
</svg>
