<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 204" role="img" aria-labelledby="t d" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">炊飯器での米の炊き方4ステップ</title>
  <desc id="d">1量る（すりきり1杯＝1合）→2研ぐ（無洗米は不要）→3水加減（内釜の目盛りまで）→4炊く（ボタンを押すだけ）。多めに炊いて1食ずつ冷凍しておく。</desc>
  <rect x="0.5" y="0.5" width="699" height="203" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">最低限これだけ：炊飯器での米の炊き方</text>

  <!-- 1 量る -->
  <rect x="36" y="64" width="136" height="96" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="64" cy="90" r="13" fill="#0F6E56"/><text x="64" y="95" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="84" y="95" font-size="14" font-weight="700" fill="#0F6E56">量る</text>
  <text x="52" y="124" font-size="11.5" fill="#6E6354">すりきり1杯</text>
  <text x="52" y="141" font-size="11.5" fill="#6E6354">＝1合（約150g）</text>

  <path d="M178 104 l8 8 l-8 8" fill="none" stroke="#C9C0B0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 2 研ぐ -->
  <rect x="200" y="64" width="136" height="96" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="228" cy="90" r="13" fill="#0F6E56"/><text x="228" y="95" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="248" y="95" font-size="14" font-weight="700" fill="#0F6E56">研ぐ</text>
  <text x="216" y="124" font-size="11.5" fill="#6E6354">水を2〜3回替える</text>
  <text x="216" y="141" font-size="11.5" fill="#B5481F" font-weight="700">無洗米は不要</text>

  <path d="M342 104 l8 8 l-8 8" fill="none" stroke="#C9C0B0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 3 水加減 -->
  <rect x="364" y="64" width="136" height="96" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="392" cy="90" r="13" fill="#0F6E56"/><text x="392" y="95" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="412" y="95" font-size="14" font-weight="700" fill="#0F6E56">水加減</text>
  <text x="380" y="124" font-size="11.5" fill="#6E6354">内釜の「◯合」の</text>
  <text x="380" y="141" font-size="11.5" fill="#6E6354">目盛りまで</text>

  <path d="M506 104 l8 8 l-8 8" fill="none" stroke="#C9C0B0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 4 炊く -->
  <rect x="528" y="64" width="136" height="96" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="556" cy="90" r="13" fill="#0F6E56"/><text x="556" y="95" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="576" y="95" font-size="14" font-weight="700" fill="#0F6E56">炊く</text>
  <text x="544" y="124" font-size="11.5" fill="#6E6354">ボタンを</text>
  <text x="544" y="141" font-size="11.5" fill="#6E6354">押すだけ</text>

  <text x="36" y="186" font-size="12.5" fill="#6E6354">多めに炊いて、1食ずつラップして冷凍 → レンジで温めれば自前の「パックご飯」。</text>
</svg>
