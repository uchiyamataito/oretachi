<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">気持ちが離れていく段階。不満を言う（まだ期待あり）から、あきらめ、無関心（赤信号）へ。ただし無関心＝手遅れとは限らない</title>
  <rect x="0.5" y="0.5" width="699" height="299" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">いちばんの赤信号は、怒りより「無関心」</text>

  <!-- stage 1 -->
  <rect x="28" y="76" width="186" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M28 120 V90 Q28 76 42 76 H200 Q214 76 214 90 V120 Z" fill="#0F6E56"/>
  <text x="121" y="104" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">① 不満を言う</text>
  <text x="121" y="142" font-size="12.5" fill="#2C2A26" text-anchor="middle">責めてくる・ぶつかる。</text>
  <text x="121" y="162" font-size="12.5" fill="#2C2A26" text-anchor="middle">つらいが、まだ</text>
  <text x="121" y="184" font-size="13" font-weight="700" fill="#0F6E56" text-anchor="middle">「変わってほしい」</text>

  <!-- arrow -->
  <path d="M222 138 l22 0 m-8 -7 l8 7 -8 7" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <!-- stage 2 -->
  <rect x="254" y="76" width="186" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M254 120 V90 Q254 76 268 76 H426 Q440 76 440 90 V120 Z" fill="#1B3A57"/>
  <text x="347" y="104" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">② あきらめ</text>
  <text x="347" y="142" font-size="12.5" fill="#2C2A26" text-anchor="middle">言っても無駄だと感じ、</text>
  <text x="347" y="162" font-size="12.5" fill="#2C2A26" text-anchor="middle">不満を口にしなく</text>
  <text x="347" y="182" font-size="12.5" fill="#2C2A26" text-anchor="middle">なっていく。</text>

  <!-- arrow -->
  <path d="M448 138 l22 0 m-8 -7 l8 7 -8 7" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <!-- stage 3 -->
  <rect x="480" y="76" width="192" height="124" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M480 120 V90 Q480 76 494 76 H658 Q672 76 672 90 V120 Z" fill="#B5481F"/>
  <text x="576" y="104" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ 無関心（赤信号）</text>
  <text x="576" y="142" font-size="12.5" fill="#2C2A26" text-anchor="middle">会話が事務的に。予定を</text>
  <text x="576" y="162" font-size="12.5" fill="#2C2A26" text-anchor="middle">共有しない。淡々と</text>
  <text x="576" y="182" font-size="12.5" fill="#2C2A26" text-anchor="middle">距離を取る。</text>

  <!-- note -->
  <rect x="28" y="216" width="644" height="64" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="350" y="241" font-size="13.5" font-weight="700" fill="#1B3A57" text-anchor="middle">ただし「無関心＝もう手遅れ」とは限らない。</text>
  <text x="350" y="263" font-size="12.5" fill="#6E6354" text-anchor="middle">疲れて一時的に心を閉じている場合もある。サインは判定の道具じゃなく、自分が落ち着くための目安だ。</text>
</svg>
