<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 324" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">妻が離婚を切り出す夫によくある3つの型。どれも「悪気はなかった」が共通する</title>
  <rect x="0.5" y="0.5" width="699" height="323" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">よく見る「特徴」は、この3つの型</text>

  <!-- card 1 -->
  <rect x="28" y="66" width="206" height="182" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="131" cy="100" r="17" fill="#1B3A57"/>
  <text x="131" y="107" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="131" y="136" font-size="14.5" font-weight="700" fill="#1B3A57" text-anchor="middle">気づけなかった型</text>
  <text x="44" y="164" font-size="11.5" fill="#2C2A26">家事・育児の負担が、</text>
  <text x="44" y="184" font-size="11.5" fill="#2C2A26">知らないうちに妻へ偏る。</text>
  <text x="44" y="204" font-size="11.5" fill="#2C2A26">「手伝っている」つもりが、</text>
  <text x="44" y="224" font-size="11.5" fill="#2C2A26">妻は「私が全部回してる」。</text>

  <!-- card 2 -->
  <rect x="247" y="66" width="206" height="182" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="350" cy="100" r="17" fill="#1B3A57"/>
  <text x="350" y="107" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="350" y="136" font-size="14.5" font-weight="700" fill="#1B3A57" text-anchor="middle">受け止めそびれ型</text>
  <text x="263" y="164" font-size="11.5" fill="#2C2A26">妻の不満を、受け止め</text>
  <text x="263" y="184" font-size="11.5" fill="#2C2A26">そびれていた。「それくらい」</text>
  <text x="263" y="204" font-size="11.5" fill="#2C2A26">「こうすれば」と返して、</text>
  <text x="263" y="224" font-size="11.5" fill="#2C2A26">“分かってもらえない”が積もる。</text>

  <!-- card 3 -->
  <rect x="466" y="66" width="206" height="182" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="569" cy="100" r="17" fill="#1B3A57"/>
  <text x="569" y="107" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="569" y="136" font-size="14.5" font-weight="700" fill="#1B3A57" text-anchor="middle">安心を渡せなかった型</text>
  <text x="482" y="164" font-size="11.5" fill="#2C2A26">お金の不安や、責められると</text>
  <text x="482" y="184" font-size="11.5" fill="#2C2A26">感じる日々。強い口調や</text>
  <text x="482" y="204" font-size="11.5" fill="#2C2A26">無関心。小さく見えても、</text>
  <text x="482" y="224" font-size="11.5" fill="#2C2A26">積み重なっていく。</text>

  <!-- bottom band -->
  <rect x="28" y="264" width="644" height="48" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="350" y="287" font-size="15" font-weight="700" fill="#0F6E56" text-anchor="middle">共通するのは「悪気はなかった」こと。</text>
  <text x="350" y="305" font-size="12.5" fill="#2C2A26" text-anchor="middle">性格やハズレの話じゃない。気づけなかっただけ――そして、今から変えられる。</text>
</svg>
