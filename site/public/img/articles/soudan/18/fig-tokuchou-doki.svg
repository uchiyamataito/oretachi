<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">妻側の離婚申立て動機の割合（令和6年・2024年 司法統計）。性格が合わない38.3%が最多で、支え・安心に関わる項目が続く</title>
  <rect x="0.5" y="0.5" width="699" height="359" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">妻側が挙げる「離婚したい理由」の割合</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">“支え・安心”に関わる項目が、上位に並ぶ（令和6年／複数選択可）</text>

  <!-- 1 性格が合わない -->
  <text x="36" y="98" font-size="13.5" font-weight="700" fill="#1B3A57">性格が合わない</text>
  <rect x="190" y="86" width="383" height="18" rx="4" fill="#1B3A57"/>
  <text x="581" y="100" font-size="13" font-weight="700" fill="#1B3A57">38.3%</text>

  <!-- 2 生活費を渡さない -->
  <text x="36" y="136" font-size="13.5" font-weight="700" fill="#1B3A57">生活費を渡さない</text>
  <rect x="190" y="124" width="289" height="18" rx="4" fill="#0F6E56"/>
  <text x="487" y="138" font-size="13" font-weight="700" fill="#0F6E56">28.9%</text>

  <!-- 3 精神的に虐待する -->
  <text x="36" y="174" font-size="13.5" font-weight="700" fill="#1B3A57">精神的に虐待する</text>
  <rect x="190" y="162" width="262" height="18" rx="4" fill="#0F6E56"/>
  <text x="460" y="176" font-size="13" font-weight="700" fill="#0F6E56">26.2%</text>

  <!-- 4 暴力を振るう -->
  <text x="36" y="212" font-size="13.5" font-weight="700" fill="#1B3A57">暴力を振るう</text>
  <rect x="190" y="200" width="178" height="18" rx="4" fill="#0F6E56"/>
  <text x="376" y="214" font-size="13" font-weight="700" fill="#0F6E56">17.8%</text>

  <!-- 5 異性関係 -->
  <text x="36" y="250" font-size="13.5" font-weight="700" fill="#1B3A57">異性関係</text>
  <rect x="190" y="238" width="133" height="18" rx="4" fill="#0F6E56"/>
  <text x="331" y="252" font-size="13" font-weight="700" fill="#0F6E56">13.3%</text>

  <!-- note box -->
  <rect x="36" y="274" width="628" height="76" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="52" y="296" font-size="12" fill="#6E6354">※ 裁判所「令和6年 司法統計年報（家事編）第19表 婚姻関係事件数―申立ての動機別」より、妻からの申立て。</text>
  <text x="52" y="314" font-size="12" fill="#6E6354">　申立件数に対する割合で、複数選択可のため合計は100%を超える。割合は年により変動する。</text>
  <text x="52" y="332" font-size="12" fill="#6E6354">　「いきなり」に見えても、相手の中では理由が積み重なっていることが多い。</text>
</svg>
