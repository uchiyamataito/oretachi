<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">住宅ローンが残る家の財産分与の考え方。家の価値が残債を上回るアンダーローンなら差額が対象、残債が上回るオーバーローンなら家の価値はゼロ扱いで他の財産と調整</title>
  <rect x="0.5" y="0.5" width="699" height="399" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">住宅ローンが残る家は、どう扱われる？</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">家の価値とローン残債の、どちらが大きいかで変わる。</text>

  <!-- start -->
  <rect x="250" y="86" width="200" height="46" rx="10" fill="#1B3A57"/>
  <text x="350" y="106" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">家の価値とローン残債を</text>
  <text x="350" y="124" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">くらべる</text>

  <!-- branch lines -->
  <path d="M350 132 L350 150 M180 150 L520 150 M180 150 L180 174 M520 150 L520 174" stroke="#C9C0B0" stroke-width="2" fill="none"/>

  <!-- left: under loan -->
  <rect x="40" y="174" width="290" height="86" rx="12" fill="#EFF7F2" stroke="#CBE5D6"/>
  <text x="58" y="200" font-size="14" font-weight="700" fill="#0F6E56">価値 ＞ 残債（アンダーローン）</text>
  <text x="58" y="226" font-size="12.5" fill="#2C2A26">売れば手元に残る差額があり、その</text>
  <text x="58" y="244" font-size="12.5" fill="#2C2A26">差額がプラスの財産として対象になる。</text>

  <!-- right: over loan -->
  <rect x="370" y="174" width="290" height="86" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="388" y="200" font-size="14" font-weight="700" fill="#B5481F">残債 ＞ 価値（オーバーローン）</text>
  <text x="388" y="226" font-size="12.5" fill="#2C2A26">家の価値はゼロ扱い。それ単独では</text>
  <text x="388" y="244" font-size="12.5" fill="#2C2A26">対象にならず、他の財産と合わせ調整。</text>

  <!-- caution box -->
  <rect x="40" y="280" width="620" height="100" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="58" y="306" font-size="13.5" font-weight="700" fill="#B5481F">⚠ 名義を変えても、返済義務は自動では変わらない</text>
  <text x="58" y="330" font-size="12.5" fill="#2C2A26">家の名義を相手に移しても、銀行に対する債務者は元のままのことが多い。</text>
  <text x="58" y="350" font-size="12.5" fill="#2C2A26">払う人が滞ると、抵当権が実行されて競売になり、住む人が家を失うおそれも。</text>
  <text x="58" y="370" font-size="12.5" font-weight="700" fill="#B5481F">「住む人・払う人・名義」がずれると複雑。自己判断せず早めに専門家へ。</text>
</svg>
