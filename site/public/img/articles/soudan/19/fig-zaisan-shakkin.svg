<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">借金の扱い。ギャンブルや個人的な浪費でつくった借金は対象外で相手に背負わせない。住宅ローンや教育費など夫婦の生活や共有財産のための借金は清算で考慮される</title>
  <rect x="0.5" y="0.5" width="699" height="319" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">借金（マイナス）は、どう扱われる？</text>
  <text x="36" y="70" font-size="12.5" fill="#6E6354">何のための借金かで変わる。借金そのものを「半分こ」する制度ではない。</text>

  <!-- left: personal debt -->
  <rect x="36" y="84" width="306" height="152" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H328 Q342 84 342 98 V128 Z" fill="#B5481F"/>
  <text x="189" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">× 対象外（相手に背負わせない）</text>
  <g font-size="13.5" fill="#2C2A26">
    <circle cx="62" cy="149" r="3" fill="#B5481F"/><text x="76" y="154">ギャンブルでつくった借金</text>
    <circle cx="62" cy="177" r="3" fill="#B5481F"/><text x="76" y="182">個人的な浪費・遊びの借金</text>
  </g>
  <text x="60" y="216" font-size="12" fill="#6E6354">＝一方の都合でつくった借金は分けない</text>

  <!-- right: common debt -->
  <rect x="358" y="84" width="306" height="152" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 128 V98 Q358 84 372 84 H650 Q664 84 664 98 V128 Z" fill="#0F6E56"/>
  <text x="511" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">△ 清算で考慮される</text>
  <g font-size="13.5" fill="#2C2A26">
    <circle cx="384" cy="149" r="3" fill="#0F6E56"/><text x="398" y="154">住宅ローン</text>
    <circle cx="384" cy="177" r="3" fill="#0F6E56"/><text x="398" y="182">教育費・生活のための借入</text>
  </g>
  <text x="382" y="216" font-size="12" fill="#0F6E56">＝夫婦の生活や共有財産のための借金</text>

  <!-- note -->
  <rect x="36" y="254" width="628" height="52" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="52" y="278" font-size="12.5" fill="#6E6354">※ 財産分与は基本的にプラスの財産を分ける制度。マイナスが大きい場合は、プラスの財産から</text>
  <text x="52" y="296" font-size="12.5" fill="#6E6354">　差し引いて調整する考え方が多い。借金の扱いは事情で変わるので、込み入れば専門家へ。</text>
</svg>
