<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">修復でも離婚でも共通して効く3つの行動。1 冷静でいる（感情的な行動はどちらでもマイナス）、2 記録を残す（いつ何があったか日付つきで）、3 早めに専門家に触れておく（弁護士・法テラス・公的窓口）</title>
  <rect x="0.5" y="0.5" width="699" height="239" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">修復でも離婚でも、共通して効く3つ</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">どちらに転んでも損しない過ごし方を、今から。</text>

  <!-- card1 -->
  <rect x="36" y="82" width="200" height="134" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 126 V96 Q36 82 50 82 H222 Q236 82 236 96 V126 Z" fill="#1B3A57"/>
  <circle cx="66" cy="104" r="13" fill="#FFFFFF"/><text x="66" y="109" font-size="14" font-weight="700" fill="#1B3A57" text-anchor="middle">1</text>
  <text x="90" y="109" font-size="15" font-weight="700" fill="#FFFFFF">冷静でいる</text>
  <text x="56" y="150" font-size="12" fill="#2C2A26">感情的な行動は、修復なら</text>
  <text x="56" y="170" font-size="12" fill="#2C2A26">相手を遠ざけ、離婚なら</text>
  <text x="56" y="190" font-size="12" fill="#2C2A26">自分を不利にする。</text>

  <!-- card2 -->
  <rect x="250" y="82" width="200" height="134" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M250 126 V96 Q250 82 264 82 H436 Q450 82 450 96 V126 Z" fill="#0F6E56"/>
  <circle cx="280" cy="104" r="13" fill="#FFFFFF"/><text x="280" y="109" font-size="14" font-weight="700" fill="#0F6E56" text-anchor="middle">2</text>
  <text x="304" y="109" font-size="15" font-weight="700" fill="#FFFFFF">記録を残す</text>
  <text x="270" y="150" font-size="12" fill="#2C2A26">いつ・何があったかを</text>
  <text x="270" y="170" font-size="12" fill="#2C2A26">日付つきで淡々と。</text>
  <text x="270" y="190" font-size="12" fill="#2C2A26">どちらでも役立つ。</text>

  <!-- card3 -->
  <rect x="464" y="82" width="200" height="134" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M464 126 V96 Q464 82 478 82 H650 Q664 82 664 96 V126 Z" fill="#1B3A57"/>
  <circle cx="494" cy="104" r="13" fill="#FFFFFF"/><text x="494" y="109" font-size="14" font-weight="700" fill="#1B3A57" text-anchor="middle">3</text>
  <text x="518" y="109" font-size="15" font-weight="700" fill="#FFFFFF">早めに相談</text>
  <text x="484" y="150" font-size="12" fill="#2C2A26">弁護士・法テラス・</text>
  <text x="484" y="170" font-size="12" fill="#2C2A26">公的窓口へ。情報を持つ</text>
  <text x="484" y="190" font-size="12" fill="#2C2A26">だけで損が減る。</text>
</svg>
