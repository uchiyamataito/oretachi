<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 332" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居中に押さえる5つの軸。1 心の保ち方（不安・孤独・焦りと付き合う）、2 生活の立て直し（家事・リズム・住まい）、3 お金と証拠の扱い（自己流で動かない）、4 子との関わり（感情的にならない）、5 修復でも離婚でも共通して効く行動（冷静・記録・早めの相談）</title>
  <rect x="0.5" y="0.5" width="699" height="331" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">別居中に押さえる、5つの軸</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">修復に進む人にも、離婚に進む人にも、共通して効く。</text>

  <rect x="36" y="80" width="628" height="42" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="60" cy="101" r="12" fill="#1B3A57"/><text x="60" y="105" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="84" y="106" font-size="13.5" font-weight="700" fill="#1B3A57">心の保ち方</text>
  <text x="210" y="106" font-size="12.5" fill="#2C2A26">不安・孤独・焦りと、どう付き合うか</text>

  <rect x="36" y="128" width="628" height="42" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="60" cy="149" r="12" fill="#0F6E56"/><text x="60" y="153" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="84" y="154" font-size="13.5" font-weight="700" fill="#0F6E56">生活の立て直し</text>
  <text x="210" y="154" font-size="12.5" fill="#2C2A26">家事・生活リズム・住まいを整える</text>

  <rect x="36" y="176" width="628" height="42" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="60" cy="197" r="12" fill="#B5481F"/><text x="60" y="201" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="84" y="202" font-size="13.5" font-weight="700" fill="#B5481F">お金と証拠の扱い</text>
  <text x="210" y="202" font-size="12.5" fill="#2C2A26">自己流で動かない（無断アクセスはNG）</text>

  <rect x="36" y="224" width="628" height="42" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="60" cy="245" r="12" fill="#0F6E56"/><text x="60" y="249" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="84" y="250" font-size="13.5" font-weight="700" fill="#0F6E56">子との関わり</text>
  <text x="210" y="250" font-size="12.5" fill="#2C2A26">感情的にならないことが、いちばん子を守る</text>

  <rect x="36" y="272" width="628" height="42" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="60" cy="293" r="12" fill="#1B3A57"/><text x="60" y="297" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">5</text>
  <text x="84" y="298" font-size="13.5" font-weight="700" fill="#1B3A57">共通して効く行動</text>
  <text x="210" y="298" font-size="12.5" fill="#2C2A26">冷静・記録・早めの相談（どちらに進んでも）</text>
</svg>
