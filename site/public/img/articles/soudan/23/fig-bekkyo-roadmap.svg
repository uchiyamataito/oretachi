<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居後のロードマップ。別居（今ここ）→まず父母の協議→まとまらなければ家庭裁判所の調停（調停委員が仲介）→それでも決まらなければ審判・裁判。婚姻費用や面会交流も、それぞれ調停で決められる。早い段階で弁護士に相談し、ルールを知っておくほど有利</title>
  <rect width="700" height="250" fill="#ffffff"/>
  <text x="36" y="38" font-size="19" font-weight="700" fill="#2b3a5b">これからの流れ（もし離婚に進む場合）</text>
  <text x="36" y="60" font-size="12.5" fill="#6b7280">感情ではなく「手続き」で進む。ゴールが見えれば今の一手の意味が分かる。</text>

  <rect x="36" y="80" width="148" height="80" rx="12" fill="#eef1f6" stroke="#2b3a5b" stroke-width="1.5"/>
  <text x="110" y="112" font-size="14" font-weight="700" fill="#2b3a5b" text-anchor="middle">別居</text>
  <text x="110" y="134" font-size="11.5" fill="#33433a" text-anchor="middle">今ここ。まず</text>
  <text x="110" y="150" font-size="11.5" fill="#33433a" text-anchor="middle">失点しない</text>

  <path d="M190 120 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#9aa1ab" stroke-width="2.5"/>

  <rect x="218" y="80" width="148" height="80" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="292" y="112" font-size="14" font-weight="700" fill="#3f7d54" text-anchor="middle">協議</text>
  <text x="292" y="134" font-size="11.5" fill="#26402e" text-anchor="middle">父母の話し合い</text>
  <text x="292" y="150" font-size="11.5" fill="#26402e" text-anchor="middle">（お金・子）</text>

  <path d="M372 120 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#9aa1ab" stroke-width="2.5"/>

  <rect x="400" y="80" width="148" height="80" rx="12" fill="#eef1f6" stroke="#cdd8ea"/>
  <text x="474" y="112" font-size="14" font-weight="700" fill="#2b3a5b" text-anchor="middle">調停</text>
  <text x="474" y="134" font-size="11.5" fill="#33433a" text-anchor="middle">家裁で調停委員</text>
  <text x="474" y="150" font-size="11.5" fill="#33433a" text-anchor="middle">が仲介</text>

  <path d="M554 120 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#9aa1ab" stroke-width="2.5"/>

  <rect x="582" y="80" width="82" height="80" rx="12" fill="#eef1f6" stroke="#cdd8ea"/>
  <text x="623" y="112" font-size="14" font-weight="700" fill="#2b3a5b" text-anchor="middle">審判</text>
  <text x="623" y="134" font-size="11.5" fill="#33433a" text-anchor="middle">裁判所が</text>
  <text x="623" y="150" font-size="11.5" fill="#33433a" text-anchor="middle">判断</text>

  <rect x="36" y="176" width="628" height="58" rx="12" fill="#fbf6ee" stroke="#e0cdb2"/>
  <text x="52" y="200" font-size="12.5" fill="#5b4a33">・婚姻費用・面会交流も、それぞれ調停で決められる。</text>
  <text x="52" y="220" font-size="12.5" fill="#5b4a33">・早い段階で弁護士に相談し、ルールを把握しておくほど有利。費用不安なら法テラスも。</text>
</svg>
