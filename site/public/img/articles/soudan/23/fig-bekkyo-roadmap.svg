<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 258" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居後のロードマップ。別居（今ここ）→まず父母の協議→まとまらなければ家庭裁判所の調停（調停委員が仲介）→それでも決まらなければ審判・裁判。婚姻費用や面会交流も、それぞれ調停で決められる。早い段階で弁護士に相談し、ルールを知っておくほど有利</title>
  <rect x="0.5" y="0.5" width="699" height="257" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">これからの流れ（もし離婚に進む場合）</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">感情ではなく「手続き」で進む。ゴールが見えれば今の一手の意味が分かる。</text>

  <rect x="36" y="84" width="148" height="80" rx="12" fill="#FBF9F4" stroke="#E2703A" stroke-width="1.5"/>
  <text x="110" y="116" font-size="14" font-weight="700" fill="#1B3A57" text-anchor="middle">別居</text>
  <text x="110" y="138" font-size="11.5" fill="#6E6354" text-anchor="middle">今ここ。まず</text>
  <text x="110" y="154" font-size="11.5" fill="#6E6354" text-anchor="middle">失点しない</text>

  <path d="M190 124 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <rect x="218" y="84" width="148" height="80" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="292" y="116" font-size="14" font-weight="700" fill="#0F6E56" text-anchor="middle">協議</text>
  <text x="292" y="138" font-size="11.5" fill="#6E6354" text-anchor="middle">父母の話し合い</text>
  <text x="292" y="154" font-size="11.5" fill="#6E6354" text-anchor="middle">（お金・子）</text>

  <path d="M372 124 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <rect x="400" y="84" width="148" height="80" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="474" y="116" font-size="14" font-weight="700" fill="#1B3A57" text-anchor="middle">調停</text>
  <text x="474" y="138" font-size="11.5" fill="#6E6354" text-anchor="middle">家裁で調停委員</text>
  <text x="474" y="154" font-size="11.5" fill="#6E6354" text-anchor="middle">が仲介</text>

  <path d="M554 124 h22 m-10 -8 l10 8 l-10 8" fill="none" stroke="#C9C0B0" stroke-width="2.5"/>

  <rect x="582" y="84" width="82" height="80" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="623" y="116" font-size="14" font-weight="700" fill="#1B3A57" text-anchor="middle">審判</text>
  <text x="623" y="138" font-size="11.5" fill="#6E6354" text-anchor="middle">裁判所が</text>
  <text x="623" y="154" font-size="11.5" fill="#6E6354" text-anchor="middle">判断</text>

  <rect x="36" y="180" width="628" height="60" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="200" r="3" fill="#1B3A57"/>
  <text x="70" y="204" font-size="12.5" fill="#2C2A26">婚姻費用・面会交流も、それぞれ調停で決められる。</text>
  <circle cx="58" cy="220" r="3" fill="#1B3A57"/>
  <text x="70" y="224" font-size="12.5" fill="#2C2A26">早い段階で弁護士に相談し、ルールを把握しておくほど有利。費用不安なら法テラスも。</text>
</svg>
