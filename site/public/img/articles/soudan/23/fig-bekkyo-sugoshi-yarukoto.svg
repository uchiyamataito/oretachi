<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居中の生活の立て直し4つ。一日の型を決める（起きる・食う・寝る時間を固定）、家事は完璧を目指さない（冷凍・惣菜・外食も可、最低限回ればよい）、部屋を最低限整える（荒れると心も荒れる）、一人の時間を腐らせない（仕事・運動・趣味）</title>
  <rect x="0.5" y="0.5" width="699" height="249" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">生活の立て直し（心を守る近道）</text>

  <rect x="36" y="66" width="312" height="78" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="90" r="3" fill="#0F6E56"/>
  <text x="70" y="94" font-size="14" font-weight="700" fill="#0F6E56">一日の型を決める</text>
  <text x="70" y="118" font-size="12" fill="#2C2A26">起きる・食う・寝る時間を固定。</text>
  <text x="70" y="134" font-size="12" fill="#2C2A26">これだけで気持ちが落ち着く。</text>

  <rect x="360" y="66" width="304" height="78" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="382" cy="90" r="3" fill="#0F6E56"/>
  <text x="394" y="94" font-size="14" font-weight="700" fill="#0F6E56">家事は完璧を目指さない</text>
  <text x="394" y="118" font-size="12" fill="#2C2A26">冷凍・惣菜・外食も組み合わせ。</text>
  <text x="394" y="134" font-size="12" fill="#2C2A26">最低限回れば、まず合格。</text>

  <rect x="36" y="152" width="312" height="78" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="176" r="3" fill="#0F6E56"/>
  <text x="70" y="180" font-size="14" font-weight="700" fill="#0F6E56">部屋を最低限整える</text>
  <text x="70" y="204" font-size="12" fill="#2C2A26">部屋が荒れると心も荒れる。</text>
  <text x="70" y="220" font-size="12" fill="#2C2A26">整えると頭が少しクリアに。</text>

  <rect x="360" y="152" width="304" height="78" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="382" cy="176" r="3" fill="#1B3A57"/>
  <text x="394" y="180" font-size="14" font-weight="700" fill="#1B3A57">時間を腐らせない</text>
  <text x="394" y="204" font-size="12" fill="#2C2A26">仕事・運動・趣味に手をつける。</text>
  <text x="394" y="220" font-size="12" fill="#2C2A26">立て直しに使えた人は強い。</text>
</svg>
