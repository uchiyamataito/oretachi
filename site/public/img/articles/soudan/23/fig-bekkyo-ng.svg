<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居直後の致命的なNG行動6つ。長文の謝罪・反論LINE（証拠化）、婚姻費用の不払い・兵糧攻め（差押え・悪意の遺棄）、子の無断連れ戻し（未成年者略取罪）、元の家や実家への押しかけ（住居侵入・保護命令の材料）、SNSでの暴露・中傷、その場の勢いの口約束。どれも後で自分を不利にする</title>
  <rect width="700" height="300" fill="#ffffff"/>
  <text x="36" y="38" font-size="19" font-weight="700" fill="#b5453b">やってはいけない、致命的な行動</text>
  <text x="36" y="60" font-size="12.5" fill="#6b7280">別居直後に“一発アウト”になりやすい6つ。</text>

  <rect x="36" y="76" width="312" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="54" y="102" font-size="13.5" font-weight="700" fill="#b5453b">長文の謝罪・反論LINE</text>
  <text x="54" y="124" font-size="12" fill="#6b3a35">全部スクショされ、証拠になる</text>

  <rect x="360" y="76" width="304" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="378" y="102" font-size="13.5" font-weight="700" fill="#b5453b">婚姻費用の不払い・兵糧攻め</text>
  <text x="378" y="124" font-size="12" fill="#6b3a35">差押え・悪意の遺棄で逆に不利</text>

  <rect x="36" y="148" width="312" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="54" y="174" font-size="13.5" font-weight="700" fill="#b5453b">子の無断連れ戻し</text>
  <text x="54" y="196" font-size="12" fill="#6b3a35">未成年者略取罪のリスク</text>

  <rect x="360" y="148" width="304" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="378" y="174" font-size="13.5" font-weight="700" fill="#b5453b">元の家・実家への押しかけ</text>
  <text x="378" y="196" font-size="12" fill="#6b3a35">住居侵入・保護命令の材料に</text>

  <rect x="36" y="220" width="312" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="54" y="246" font-size="13.5" font-weight="700" fill="#b5453b">SNSでの暴露・中傷</text>
  <text x="54" y="268" font-size="12" fill="#6b3a35">名誉毀損＋調停で不利に見られる</text>

  <rect x="360" y="220" width="304" height="64" rx="10" fill="#fbeeee" stroke="#e0b8b8"/>
  <text x="378" y="246" font-size="13.5" font-weight="700" fill="#b5453b">勢いの口約束</text>
  <text x="378" y="268" font-size="12" fill="#6b3a35">「家はやる」等。決めごとは書面で</text>
</svg>
