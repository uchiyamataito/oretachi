<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 312" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">別居直後の致命的なNG行動6つ。長文の謝罪・反論LINE（証拠化）、婚姻費用の不払い・兵糧攻め（差押え・悪意の遺棄）、子の無断連れ戻し（未成年者略取罪）、元の家や実家への押しかけ（住居侵入・保護命令の材料）、SNSでの暴露・中傷、その場の勢いの口約束。どれも後で自分を不利にする</title>
  <rect x="0.5" y="0.5" width="699" height="311" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#B5481F">やってはいけない、致命的な行動</text>
  <text x="52" y="66" font-size="12.5" fill="#6E6354">別居直後に“一発アウト”になりやすい6つ。</text>

  <rect x="36" y="82" width="312" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="104" r="3" fill="#B5481F"/>
  <text x="70" y="108" font-size="13.5" font-weight="700" fill="#B5481F">長文の謝罪・反論LINE</text>
  <text x="70" y="130" font-size="12" fill="#6E6354">全部スクショされ、証拠になる</text>

  <rect x="360" y="82" width="304" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="382" cy="104" r="3" fill="#B5481F"/>
  <text x="394" y="108" font-size="13.5" font-weight="700" fill="#B5481F">婚姻費用の不払い・兵糧攻め</text>
  <text x="394" y="130" font-size="12" fill="#6E6354">差押え・悪意の遺棄で逆に不利</text>

  <rect x="36" y="154" width="312" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="176" r="3" fill="#B5481F"/>
  <text x="70" y="180" font-size="13.5" font-weight="700" fill="#B5481F">子の無断連れ戻し</text>
  <text x="70" y="202" font-size="12" fill="#6E6354">未成年者略取罪のリスク</text>

  <rect x="360" y="154" width="304" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="382" cy="176" r="3" fill="#B5481F"/>
  <text x="394" y="180" font-size="13.5" font-weight="700" fill="#B5481F">元の家・実家への押しかけ</text>
  <text x="394" y="202" font-size="12" fill="#6E6354">住居侵入・保護命令の材料に</text>

  <rect x="36" y="226" width="312" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="58" cy="248" r="3" fill="#B5481F"/>
  <text x="70" y="252" font-size="13.5" font-weight="700" fill="#B5481F">SNSでの暴露・中傷</text>
  <text x="70" y="274" font-size="12" fill="#6E6354">名誉毀損＋調停で不利に見られる</text>

  <rect x="360" y="226" width="304" height="64" rx="10" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="382" cy="248" r="3" fill="#B5481F"/>
  <text x="394" y="252" font-size="13.5" font-weight="700" fill="#B5481F">勢いの口約束</text>
  <text x="394" y="274" font-size="12" fill="#6E6354">「家はやる」等。決めごとは書面で</text>
</svg>
