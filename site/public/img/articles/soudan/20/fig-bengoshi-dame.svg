<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 312" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">避けたいダメな弁護士の4サイン。不安をあおって即契約を迫る・費用の説明があいまいで見積もりを出さない・高圧的でこちらの話を聞かない・必ず勝てると結果を保証する</title>
  <rect x="0.5" y="0.5" width="699" height="311" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">契約前に確認したい4つのサイン</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">大半の弁護士は誠実。ごく一部の「避けたい対応」を知っておく。</text>

  <!-- card1 -->
  <rect x="36" y="84" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H328 Q342 84 342 98 V128 Z" fill="#B5481F"/>
  <text x="189" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">× 不安をあおって即契約を迫る</text>
  <text x="58" y="152" font-size="12.5" fill="#2C2A26">「今すぐ依頼しないと不利」と</text>
  <text x="58" y="172" font-size="12.5" fill="#2C2A26">急かす。冷静に考える時間をくれる人を。</text>

  <!-- card2 -->
  <rect x="358" y="84" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 128 V98 Q358 84 372 84 H650 Q664 84 664 98 V128 Z" fill="#B5481F"/>
  <text x="511" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">× 費用の説明があいまい</text>
  <text x="380" y="152" font-size="12.5" fill="#2C2A26">見積もりを出さない。後から高額</text>
  <text x="380" y="172" font-size="12.5" fill="#2C2A26">請求のトラブルのもと。</text>

  <!-- card3 -->
  <rect x="36" y="192" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 236 V206 Q36 192 50 192 H328 Q342 192 342 206 V236 Z" fill="#B5481F"/>
  <text x="189" y="220" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">× 高圧的で話を聞かない</text>
  <text x="58" y="260" font-size="12.5" fill="#2C2A26">頭ごなしに進める人とは、長く</text>
  <text x="58" y="280" font-size="12.5" fill="#2C2A26">やり取りできない。</text>

  <!-- card4 -->
  <rect x="358" y="192" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 236 V206 Q358 192 372 192 H650 Q664 192 664 206 V236 Z" fill="#B5481F"/>
  <text x="511" y="220" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">×「必ず勝てる」と保証する</text>
  <text x="380" y="260" font-size="12.5" fill="#2C2A26">結果は相手の出方で変わる。リスクも</text>
  <text x="380" y="280" font-size="12.5" fill="#2C2A26">正直に言う人のほうが信頼できる。</text>
</svg>
