<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 312" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">弁護士を頼るサイン。相手が弁護士を立てた・話し合いにならない/本気で揉めそう・不安で動けない・DVやモラハラで直接やり取りが危険。ひとつでも当てはまれば相談を考えていい</title>
  <rect x="0.5" y="0.5" width="699" height="311" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">弁護士を「頼るサイン」</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">いきなり必須ではない。でも、ひとつでも当てはまるなら相談を考えていい。</text>

  <!-- card1 -->
  <rect x="36" y="84" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H328 Q342 84 342 98 V128 Z" fill="#1B3A57"/>
  <text x="189" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">① 相手が弁護士を立てた</text>
  <text x="58" y="152" font-size="12.5" fill="#2C2A26">知識と交渉の差がつきやすい。</text>
  <text x="58" y="172" font-size="12.5" fill="#2C2A26">早めに相談を。</text>

  <!-- card2 -->
  <rect x="358" y="84" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 128 V98 Q358 84 372 84 H650 Q664 84 664 98 V128 Z" fill="#1B3A57"/>
  <text x="511" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">② 話し合いにならない/揉めそう</text>
  <text x="380" y="152" font-size="12.5" fill="#2C2A26">財産・親権・慰謝料などで</text>
  <text x="380" y="172" font-size="12.5" fill="#2C2A26">本気で対立している。</text>

  <!-- card3 -->
  <rect x="36" y="192" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 236 V206 Q36 192 50 192 H328 Q342 192 342 206 V236 Z" fill="#1B3A57"/>
  <text x="189" y="220" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">③ 不安で、自分では動けない</text>
  <text x="58" y="260" font-size="12.5" fill="#2C2A26">整理してもらうだけでも</text>
  <text x="58" y="280" font-size="12.5" fill="#2C2A26">楽になる。</text>

  <!-- card4 danger -->
  <rect x="358" y="192" width="306" height="96" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 236 V206 Q358 192 372 192 H650 Q664 192 664 206 V236 Z" fill="#B5481F"/>
  <text x="511" y="220" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">④ DV・モラハラで危険</text>
  <text x="380" y="260" font-size="12.5" fill="#2C2A26">直接やり取りが危ない。安全確保</text>
  <text x="380" y="280" font-size="12.5" fill="#2C2A26">を最優先に、間に入れる。</text>
</svg>
