<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">今の家を出るとき：賃貸と持ち家でやることが違う</title>
  <rect width="700" height="360" fill="#ffffff"/>
  <text x="36" y="44" font-size="20" font-weight="700" fill="#2b3a5b">今の家、賃貸か持ち家かで全然違う</text>

  <!-- 賃貸 -->
  <rect x="36" y="64" width="306" height="272" rx="16" fill="#eef1f6" stroke="#c9d2e0"/>
  <text x="58" y="98" font-size="17" font-weight="700" fill="#2b3a5b">賃貸の場合</text>
  <g font-size="14.5" fill="#33433a">
    <text x="58" y="138">・解約予告（一般に1か月前）</text>
    <text x="74" y="164">まず契約書で予告期間を確認</text>
    <text x="58" y="200">・連絡は記録が残る方法で</text>
    <text x="58" y="236">・敷金は精算して返金</text>
    <text x="74" y="262">通常損耗・経年劣化は貸主負担</text>
    <text x="58" y="298">・特約（敷引き等）に注意</text>
  </g>

  <!-- 持ち家 -->
  <rect x="358" y="64" width="306" height="272" rx="16" fill="#fdeeea" stroke="#eebbb0"/>
  <text x="380" y="98" font-size="17" font-weight="700" fill="#9a4634">持ち家（自分が出る）</text>
  <g font-size="14.5" fill="#5b3a32">
    <text x="380" y="138">・ローンは名義人が払い続ける</text>
    <text x="396" y="164">家を出ても義務は消えない</text>
    <text x="380" y="200">・名義変更は原則むずかしい</text>
    <text x="380" y="236">・売るなら残債と売値を確認</text>
    <text x="396" y="262">アンダー／オーバーローン</text>
    <text x="380" y="298">・売却は数か月〜。逆算して動く</text>
  </g>
</svg>
