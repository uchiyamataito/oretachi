<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">共同親権の決まり方：協議で選ぶ→まとまらなければ家裁が判断→DV・虐待のおそれは単独親権</title>
  <rect width="700" height="330" fill="#ffffff"/>
  <text x="36" y="44" font-size="20" font-weight="700" fill="#2b3a5b">単独親権か、共同親権か（2026年4月〜）</text>

  <!-- step1 -->
  <rect x="36" y="66" width="628" height="62" rx="14" fill="#eef1f6" stroke="#c9d2e0"/>
  <circle cx="70" cy="97" r="16" fill="#2b3a5b"/>
  <text x="70" y="103" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="100" y="92" font-size="16" font-weight="700" fill="#2b3a5b">まず父母の協議で選ぶ</text>
  <text x="100" y="116" font-size="14" fill="#5b6677">単独親権／共同親権のどちらにするかを話し合う。</text>

  <!-- arrow -->
  <text x="350" y="150" font-size="16" fill="#aeb6c4" text-anchor="middle">▼ まとまらなければ</text>

  <!-- step2 -->
  <rect x="36" y="160" width="628" height="62" rx="14" fill="#eef1f6" stroke="#c9d2e0"/>
  <circle cx="70" cy="191" r="16" fill="#2b3a5b"/>
  <text x="70" y="197" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="100" y="186" font-size="16" font-weight="700" fill="#2b3a5b">家庭裁判所が判断</text>
  <text x="100" y="210" font-size="14" fill="#5b6677">「子の利益」を最優先に、単独か共同かを決める。</text>

  <!-- step3 (caution) -->
  <rect x="36" y="248" width="628" height="64" rx="14" fill="#fdeeea" stroke="#eebbb0"/>
  <text x="58" y="278" font-size="16" font-weight="700" fill="#e0664c">DV・虐待のおそれがあるときは、必ず単独親権</text>
  <text x="58" y="302" font-size="14" fill="#9a4634">共同親権は「選択肢」。不適切なケースでは認められない。安全が最優先。</text>
</svg>
