<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 330" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">共同親権の決まり方：協議で選ぶ→まとまらなければ家裁が判断→DV・虐待のおそれは単独親権</title>
  <rect x="0.5" y="0.5" width="699" height="329" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">単独親権か、共同親権か（2026年4月〜）</text>

  <!-- step1 -->
  <rect x="36" y="68" width="628" height="62" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="70" cy="99" r="16" fill="#1B3A57"/>
  <text x="70" y="105" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="100" y="94" font-size="16" font-weight="700" fill="#1B3A57">まず父母の協議で選ぶ</text>
  <text x="100" y="118" font-size="14" fill="#6E6354">単独親権／共同親権のどちらにするかを話し合う。</text>

  <!-- arrow -->
  <text x="350" y="152" font-size="16" fill="#8C8270" text-anchor="middle">▼ まとまらなければ</text>

  <!-- step2 -->
  <rect x="36" y="162" width="628" height="62" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <circle cx="70" cy="193" r="16" fill="#1B3A57"/>
  <text x="70" y="199" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="100" y="188" font-size="16" font-weight="700" fill="#1B3A57">家庭裁判所が判断</text>
  <text x="100" y="212" font-size="14" fill="#6E6354">「子の利益」を最優先に、単独か共同かを決める。</text>

  <!-- step3 (caution) -->
  <rect x="36" y="250" width="628" height="64" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <rect x="54" y="264" width="4" height="36" rx="2" fill="#B5481F"/>
  <text x="70" y="280" font-size="16" font-weight="700" fill="#B5481F">DV・虐待のおそれがあるときは、必ず単独親権</text>
  <text x="70" y="304" font-size="14" fill="#6E6354">共同親権は「選択肢」。不適切なケースでは認められない。安全が最優先。</text>
</svg>
