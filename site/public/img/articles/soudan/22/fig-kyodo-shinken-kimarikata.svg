<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 252" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">親権のかたちの決まり方。まず父母の話し合いで決める。まとまらなければ家庭裁判所が子の利益を基準に判断する。DVや虐待がある場合、共同での協議が難しい場合は必ず単独親権になる</title>
  <rect x="0.5" y="0.5" width="699" height="251" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">どう決まる？ 話し合い→家裁</text>

  <!-- step1 -->
  <rect x="36" y="70" width="196" height="92" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 114 V84 Q36 70 50 70 H218 Q232 70 232 84 V114 Z" fill="#0F6E56"/>
  <text x="134" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">1. 父母の話し合い</text>
  <text x="54" y="136" font-size="12" fill="#2C2A26">まずは協議で決める。</text>
  <text x="54" y="154" font-size="12" fill="#2C2A26">合意すれば単独／共同。</text>

  <path d="M240 116 h24 m-10 -8 l10 8 l-10 8" fill="none" stroke="#C9C0B0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- step2 -->
  <rect x="272" y="70" width="196" height="92" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M272 114 V84 Q272 70 286 70 H454 Q468 70 468 84 V114 Z" fill="#1B3A57"/>
  <text x="370" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">2. 家庭裁判所</text>
  <text x="290" y="136" font-size="12" fill="#2C2A26">まとまらなければ、</text>
  <text x="290" y="154" font-size="12" fill="#2C2A26">「子の利益」で判断。</text>

  <path d="M476 116 h24 m-10 -8 l10 8 l-10 8" fill="none" stroke="#C9C0B0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 必ず単独 -->
  <rect x="508" y="70" width="156" height="92" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M508 114 V84 Q508 70 522 70 H650 Q664 70 664 84 V114 Z" fill="#B5481F"/>
  <text x="586" y="98" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">必ず単独</text>
  <text x="526" y="136" font-size="12" fill="#2C2A26">DV・虐待、</text>
  <text x="526" y="154" font-size="12" fill="#2C2A26">協議が困難な場合。</text>

  <!-- note -->
  <rect x="36" y="178" width="628" height="56" rx="12" fill="#FBF9F4" stroke="#E4DACB"/>
  <text x="52" y="202" font-size="12.5" fill="#6E6354">※「子の利益」が唯一の物差し。父母の都合や勝ち負けで決まるものではない。</text>
  <text x="52" y="222" font-size="12.5" fill="#6E6354">　DVには身体的だけでなく、精神的・経済的・性的なものも含まれる。</text>
</svg>
