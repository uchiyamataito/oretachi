<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" role="img" aria-labelledby="t" font-family="'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">共同親権でも、何でも二人で決めるわけではない。日常の行為は一方の親が単独で決められる。緊急・急迫の事情があるときも単独で対応できる。進学や重要な医療など、子の重要事項だけ父母の協議が必要になる</title>
  <rect width="700" height="280" fill="#ffffff"/>
  <text x="36" y="40" font-size="19" font-weight="700" fill="#2b3a5b">共同でも、全部を二人で決めるわけではない</text>
  <text x="36" y="62" font-size="12.5" fill="#6b7280">「いちいち元妻の同意が要る」は誤解。協議が要るのは重要事項だけ。</text>

  <rect x="36" y="84" width="200" height="160" rx="12" fill="#eef3ee" stroke="#bcd3bf"/>
  <text x="56" y="114" font-size="14" font-weight="700" fill="#2f6b43">日常の行為</text>
  <text x="56" y="140" font-size="12" fill="#26402e">→ 単独で決められる</text>
  <text x="56" y="170" font-size="12" fill="#26402e">食事・習い事・塾、</text>
  <text x="56" y="190" font-size="12" fill="#26402e">学校の出欠・面談など。</text>
  <text x="56" y="220" font-size="11.5" fill="#4a5a4f">同居している親が判断。</text>

  <rect x="250" y="84" width="200" height="160" rx="12" fill="#eef1f6" stroke="#cdd8ea"/>
  <text x="270" y="114" font-size="14" font-weight="700" fill="#2b3a5b">急迫の事情</text>
  <text x="270" y="140" font-size="12" fill="#33433a">→ 単独で対応できる</text>
  <text x="270" y="170" font-size="12" fill="#33433a">急な手術など、待てない</text>
  <text x="270" y="190" font-size="12" fill="#33433a">緊急時は一方で決めてよい。</text>
  <text x="270" y="220" font-size="11.5" fill="#5b6472">子の安全が最優先。</text>

  <rect x="464" y="84" width="200" height="160" rx="12" fill="#fbf6ee" stroke="#e0cdb2"/>
  <text x="484" y="114" font-size="14" font-weight="700" fill="#c0793a">重要事項</text>
  <text x="484" y="140" font-size="12" fill="#5b4a33">→ 父母の協議が必要</text>
  <text x="484" y="170" font-size="12" fill="#5b4a33">進学・留学の決定、</text>
  <text x="484" y="190" font-size="12" fill="#5b4a33">大きな手術、遠方転居。</text>
  <text x="484" y="220" font-size="11.5" fill="#6b5943">ここだけ二人で決める。</text>
</svg>
