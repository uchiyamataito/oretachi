<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 288" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">共同親権でも、何でも二人で決めるわけではない。日常の行為は一方の親が単独で決められる。緊急・急迫の事情があるときも単独で対応できる。進学や重要な医療など、子の重要事項だけ父母の協議が必要になる</title>
  <rect x="0.5" y="0.5" width="699" height="287" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">共同でも、全部を二人で決めるわけではない</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">「いちいち元妻の同意が要る」は誤解。協議が要るのは重要事項だけ。</text>

  <!-- 日常の行為 -->
  <rect x="36" y="84" width="200" height="176" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H222 Q236 84 236 98 V128 Z" fill="#0F6E56"/>
  <text x="136" y="112" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">日常の行為</text>
  <text x="54" y="152" font-size="12.5" font-weight="700" fill="#0F6E56">→ 単独で決められる</text>
  <text x="54" y="180" font-size="12" fill="#2C2A26">食事・習い事・塾、</text>
  <text x="54" y="198" font-size="12" fill="#2C2A26">学校の出欠・面談など。</text>
  <text x="54" y="228" font-size="11.5" fill="#6E6354">同居している親が判断。</text>

  <!-- 急迫の事情 -->
  <rect x="250" y="84" width="200" height="176" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M250 128 V98 Q250 84 264 84 H436 Q450 84 450 98 V128 Z" fill="#1B3A57"/>
  <text x="350" y="112" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">急迫の事情</text>
  <text x="268" y="152" font-size="12.5" font-weight="700" fill="#1B3A57">→ 単独で対応できる</text>
  <text x="268" y="180" font-size="12" fill="#2C2A26">急な手術など、待てない</text>
  <text x="268" y="198" font-size="12" fill="#2C2A26">緊急時は一方で決めてよい。</text>
  <text x="268" y="228" font-size="11.5" fill="#6E6354">子の安全が最優先。</text>

  <!-- 重要事項 -->
  <rect x="464" y="84" width="200" height="176" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M464 128 V98 Q464 84 478 84 H650 Q664 84 664 98 V128 Z" fill="#B5481F"/>
  <text x="564" y="112" font-size="14.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">重要事項</text>
  <text x="482" y="152" font-size="12.5" font-weight="700" fill="#B5481F">→ 父母の協議が必要</text>
  <text x="482" y="180" font-size="12" fill="#2C2A26">進学・留学の決定、</text>
  <text x="482" y="198" font-size="12" fill="#2C2A26">大きな手術、遠方転居。</text>
  <text x="482" y="228" font-size="11.5" fill="#6E6354">ここだけ二人で決める。</text>
</svg>
