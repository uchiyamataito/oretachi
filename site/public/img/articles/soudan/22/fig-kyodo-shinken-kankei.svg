<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 272" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">自分に関係あるかの二分岐。これから離婚する人は、離婚時に単独か共同かを取り決める。すでに離婚している人も、家庭裁判所に親権者変更を申し立てれば共同親権へ変更できる可能性がある</title>
  <rect x="0.5" y="0.5" width="699" height="271" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">自分に関係ある？ 2つの立場</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">すでに離婚した人にも、道は開かれている。</text>

  <!-- これから -->
  <rect x="36" y="84" width="306" height="160" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H328 Q342 84 342 98 V128 Z" fill="#1B3A57"/>
  <text x="189" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">これから離婚する</text>
  <text x="58" y="152" font-size="12.5" fill="#2C2A26">離婚の取り決めのときに、</text>
  <text x="58" y="170" font-size="12.5" fill="#2C2A26">単独か共同かを決める。</text>
  <text x="58" y="194" font-size="12.5" fill="#2C2A26">決まらなければ家裁が判断。</text>
  <text x="58" y="222" font-size="12" fill="#6E6354">親権と養育費・面会は別問題。</text>

  <!-- すでに -->
  <rect x="358" y="84" width="306" height="160" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 128 V98 Q358 84 372 84 H650 Q664 84 664 98 V128 Z" fill="#0F6E56"/>
  <text x="511" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">すでに離婚している</text>
  <text x="380" y="152" font-size="12.5" fill="#2C2A26">家庭裁判所に「親権者変更」を</text>
  <text x="380" y="170" font-size="12.5" fill="#2C2A26">申し立てれば、共同に</text>
  <text x="380" y="188" font-size="12.5" fill="#2C2A26">変更できる可能性がある。</text>
  <text x="380" y="222" font-size="12" fill="#6E6354">判断基準はやはり「子の利益」。</text>
</svg>
