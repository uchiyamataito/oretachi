<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 272" role="img" aria-labelledby="t" font-family="'Zen Kaku Gothic New','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif">
  <title id="t">共同親権の良い面と、気をつける面。良い面は、離婚後も子の重要な決定に父母双方が関われること。気をつける面は、対立が続く関係だと重要事項の協議が難しく子が板挟みになりうること。DV・高葛藤なら単独を選ぶ</title>
  <rect x="0.5" y="0.5" width="699" height="271" rx="14" fill="#FFFFFF" stroke="#ECE3D5"/>
  <rect x="36" y="28" width="4" height="22" rx="2" fill="#E2703A"/>
  <text x="52" y="46" font-size="19" font-weight="800" fill="#1B3A57">良い面と、気をつける面</text>
  <text x="36" y="68" font-size="12.5" fill="#6E6354">「父親に有利」と単純に喜ぶ話ではない。関係の質で向き不向きがある。</text>

  <!-- 良い面 -->
  <rect x="36" y="84" width="306" height="160" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M36 128 V98 Q36 84 50 84 H328 Q342 84 342 98 V128 Z" fill="#0F6E56"/>
  <text x="189" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">良い面</text>
  <circle cx="58" cy="147" r="3" fill="#0F6E56"/>
  <text x="70" y="152" font-size="12.5" fill="#2C2A26">離婚後も、進学など重要な</text>
  <text x="70" y="170" font-size="12.5" fill="#2C2A26">決定に父母双方が関われる。</text>
  <circle cx="58" cy="193" r="3" fill="#0F6E56"/>
  <text x="70" y="198" font-size="12.5" fill="#2C2A26">子が「親に捨てられていない」</text>
  <text x="70" y="216" font-size="12.5" fill="#2C2A26">と感じやすい場合がある。</text>

  <!-- 気をつける面 -->
  <rect x="358" y="84" width="306" height="160" rx="14" fill="#FBF9F4" stroke="#E4DACB"/>
  <path d="M358 128 V98 Q358 84 372 84 H650 Q664 84 664 98 V128 Z" fill="#B5481F"/>
  <text x="511" y="112" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">気をつける面</text>
  <circle cx="380" cy="147" r="3" fill="#B5481F"/>
  <text x="392" y="152" font-size="12.5" fill="#2C2A26">対立が続く関係だと、重要事項の</text>
  <text x="392" y="170" font-size="12.5" fill="#2C2A26">協議が進まず子が板挟みに。</text>
  <circle cx="380" cy="193" r="3" fill="#B5481F"/>
  <text x="392" y="198" font-size="12.5" fill="#2C2A26">DV・高葛藤なら、無理せず</text>
  <text x="392" y="216" font-size="12.5" fill="#2C2A26">単独を選ぶことが子のため。</text>
</svg>
